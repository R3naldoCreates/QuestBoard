<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuestBoard - Gamified Productivity Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUXVlc3RCb2FyZCIsInNob3J0X25hbWUiOiJRdWVzdEJvYXJkIiwiZGVzY3JpcHRpb24iOiJHYW1pZmllZCBQcm9kdWN0aXZpdHkgRGFzaGJvYXJkIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzEyMTIyMjAiLCJ0aGVtZV9jb2xvciI6IiM4YjVjZjYifQ==">
<style>
:root {
  --bg: #121220;
  --bg2: #1a1a30;
  --card: #252545;
  --card-hover: #2e2e58;
  --sidebar-bg: #1c1c38;
  --accent: #8b5cf6;
  --accent2: #3b82f6;
  --accent-dim: rgba(139,92,246,.15);
  --success: #22c55e;
  --warning: #eab308;
  --danger: #ef4444;
  --text: #f1f5f9;
  --text2: #b0bdd0;
  --text3: #6b7fa0;
  --border: #3a3a60;
  --radius: 10px;
}
[data-theme="light"] {
  --bg: #f0f2f8;
  --bg2: #e4e7f0;
  --card: #ffffff;
  --card-hover: #f5f5ff;
  --sidebar-bg: #e8eaf2;
  --text: #1e293b;
  --text2: #475569;
  --text3: #94a3b8;
  --border: #c8cde0;
  --accent-dim: rgba(139,92,246,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;font-size:15px;line-height:1.5}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ===== LOADING SCREEN ===== */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
#loading-screen .ld-icon{font-size:4rem;animation:ldBounce 1s ease infinite}
#loading-screen .ld-text{color:var(--text);font-size:1.1rem;font-weight:600}
@keyframes ldBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ===== LAYOUT ===== */
#app{display:flex;height:100vh;position:relative}
#sidebar{width:240px;min-width:240px;background:var(--sidebar-bg);border-right:2px solid var(--border);display:flex;flex-direction:column;transition:width .3s ease;overflow:hidden;z-index:40}
#sidebar.collapsed{width:56px;min-width:56px}
#sidebar.collapsed .qb-nav-label,#sidebar.collapsed .qb-sidebar-title,#sidebar.collapsed #sidebarGamification{display:none}
#sidebar.collapsed .qb-nav-item{justify-content:center;padding:12px 0}
#sidebar.collapsed .qb-nav-icon{margin-right:0}
#main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 28px;position:relative;background:var(--bg)}

/* ===== SIDEBAR ===== */
.qb-sidebar-header{padding:18px 16px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.qb-sidebar-title{font-size:1.15rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.qb-toggle-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.1rem;padding:4px 6px;border-radius:6px;transition:.2s}
.qb-toggle-btn:hover{background:var(--card);color:var(--text)}
.qb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.qb-nav-item{display:flex;align-items:center;padding:10px 14px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px;color:var(--text2);font-size:.9rem;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.qb-nav-item:hover{background:var(--card);color:var(--text)}
.qb-nav-item.active{background:var(--accent-dim);color:var(--text);font-weight:600;border-left:3px solid var(--accent)}
.qb-nav-icon{width:22px;margin-right:10px;text-align:center;font-size:.95rem}
.qb-nav-label{white-space:nowrap}

/* ===== BUTTONS ===== */
.qb-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.875rem;font-weight:600;transition:all .15s;font-family:inherit;color:var(--text);white-space:nowrap}
.qb-btn:active{transform:scale(.97)}
.qb-btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.qb-btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.qb-btn-secondary{background:var(--card);border:1px solid var(--border)}
.qb-btn-secondary:hover{border-color:var(--accent)}
.qb-btn-danger{background:var(--danger);color:#fff}
.qb-btn-danger:hover{filter:brightness(1.1)}
.qb-btn-success{background:var(--success);color:#fff}
.qb-btn-success:hover{filter:brightness(1.1)}
.qb-btn-sm{padding:5px 10px;font-size:.8rem}
.qb-btn-icon{width:36px;height:36px;padding:0;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:8px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center}
.qb-btn-icon:hover{border-color:var(--accent);color:var(--accent)}

/* ===== CARDS ===== */
.qb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color .2s}
.qb-card:hover{border-color:rgba(139,92,246,.3)}
.qb-stat-card{text-align:center;padding:14px 10px}

/* ===== FORMS ===== */
.qb-input,.qb-textarea,.qb-select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-family:inherit;font-size:.875rem;width:100%;transition:border-color .2s}
.qb-input:focus,.qb-textarea:focus,.qb-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,.12)}
.qb-textarea{resize:vertical;min-height:70px}
.qb-select{cursor:pointer;appearance:auto}
.qb-label{display:block;font-size:.85rem;font-weight:600;margin-bottom:5px;color:var(--text2)}
.qb-form-group{margin-bottom:14px}

/* ===== BADGES ===== */
.qb-badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.qb-badge-work{background:rgba(59,130,246,.2);color:#60a5fa}
.qb-badge-daily{background:rgba(34,197,94,.2);color:#4ade80}
.qb-badge-project{background:rgba(168,85,247,.2);color:#c084fc}
.qb-badge-low{background:rgba(34,197,94,.2);color:#4ade80}
.qb-badge-medium{background:rgba(59,130,246,.2);color:#60a5fa}
.qb-badge-high{background:rgba(234,179,8,.2);color:#facc15}
.qb-badge-critical{background:rgba(239,68,68,.2);color:#f87171}
.qb-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:.72rem;background:rgba(139,92,246,.12);color:var(--accent);margin:1px}

/* ===== CHIP / TOGGLE ===== */
.qb-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:.15s;border:1px solid var(--border);color:var(--text2);background:none;font-family:inherit}
.qb-chip:hover,.qb-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--text)}
.qb-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.qb-toggle-row:last-child{border-bottom:none}
.qb-toggle{position:relative;width:42px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;transition:.2s;border:none;padding:0}
.qb-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
.qb-toggle.on{background:var(--accent)}
.qb-toggle.on::after{left:23px}

/* ===== MODAL ===== */
.qb-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.qb-modal-overlay.show{display:flex}
.qb-modal{background:var(--card);border:1px solid var(--border);border-radius:14px;max-width:620px;width:100%;max-height:88vh;overflow-y:auto;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.qb-modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.qb-modal-title{font-size:1.05rem;font-weight:700}
.qb-modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.2rem;padding:4px}
.qb-modal-close:hover{color:var(--text)}
.qb-modal-body{padding:22px}
.qb-modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 22px;border-top:1px solid var(--border)}

/* ===== TOAST ===== */
#toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.qb-toast{padding:12px 18px;border-radius:10px;font-size:.875rem;animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;display:flex;align-items:center;gap:8px;min-width:240px;box-shadow:0 4px 24px rgba(0,0,0,.35);pointer-events:auto;color:#fff}
.qb-toast-success{background:var(--success)}
.qb-toast-error{background:var(--danger)}
.qb-toast-info{background:var(--accent2)}
.qb-toast-warning{background:var(--warning);color:#1a1a2e}
@keyframes toastIn{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* ===== CONTEXT MENU ===== */
.qb-ctx{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:5px;z-index:150;display:none;min-width:170px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
.qb-ctx-item{padding:8px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;color:var(--text2);display:flex;align-items:center;gap:8px;transition:.12s}
.qb-ctx-item:hover{background:var(--card-hover);color:var(--text)}

/* ===== TASK CARDS ===== */
.qb-task{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;transition:all .2s;cursor:pointer}
.qb-task:hover{border-color:rgba(139,92,246,.3);transform:translateY(-1px)}
.qb-task.done{opacity:.55}
.qb-task.done .qb-task-title{text-decoration:line-through}
.qb-task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.qb-task-check:hover{border-color:var(--success)}
.qb-task-check.checked{background:var(--success);border-color:var(--success)}
.qb-task-check.checked::after{content:'\2713';color:#fff;font-size:.7rem;font-weight:700}
.qb-task-title{font-weight:600;font-size:.95rem;color:var(--text)}

/* ===== GAMIFICATION WIDGETS ===== */
.qb-xp-bar-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.qb-xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s ease}
.qb-xp-label{font-size:.72rem;color:var(--text3);margin-top:3px;display:flex;justify-content:space-between}
.qb-level-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;font-size:.78rem;font-weight:700;color:#fff}
.qb-streak{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:.85rem;color:var(--warning);font-weight:600}
.qb-pet{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.qb-pet-emoji{font-size:1.8rem}
.qb-pet-info{font-size:.75rem;color:var(--text2)}
.qb-pet-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;width:90px}
.qb-pet-fill{height:100%;background:var(--success);border-radius:2px}

/* ===== XP FLOAT & CONFETTI ===== */
.qb-xp-float{position:fixed;pointer-events:none;font-weight:800;font-size:1.1rem;color:var(--accent);z-index:300;animation:xpUp 1.4s ease forwards}
@keyframes xpUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-35px) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(.8)}}
.qb-confetti{position:fixed;width:8px;height:8px;z-index:300;pointer-events:none;animation:confDrop 2s ease forwards}
@keyframes confDrop{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ===== ACHIEVEMENT POPUP ===== */
.qb-achieve{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:2px solid var(--warning);border-radius:16px;padding:28px;text-align:center;z-index:250;animation:achIn .4s ease}
@keyframes achIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}60%{transform:translate(-50%,-50%) scale(1.08)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* ===== CALENDAR ===== */
.qb-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.qb-cal-head{text-align:center;font-size:.72rem;font-weight:700;color:var(--text3);padding:8px 2px;text-transform:uppercase;letter-spacing:.5px}
.qb-cal-day{min-height:44px;padding:4px;border-radius:8px;cursor:pointer;transition:.15s;position:relative;font-size:.82rem;color:var(--text)}
.qb-cal-day:hover{background:var(--card)}
.qb-cal-day.today{background:var(--accent-dim);border:1px solid var(--accent);font-weight:700}
.qb-cal-day.other{opacity:.28}
.qb-cal-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin:1px}
.qb-time-slot{height:48px;border-bottom:1px solid rgba(58,58,96,.35);padding:2px 6px;font-size:.7rem;color:var(--text3);position:relative}
.qb-task-block{position:absolute;left:3px;right:3px;border-radius:5px;padding:3px 7px;font-size:.72rem;cursor:pointer;overflow:hidden;z-index:2;transition:.15s;color:var(--text)}
.qb-task-block:hover{transform:scale(1.02);z-index:3;filter:brightness(1.15)}
.qb-week-col{border-left:1px solid var(--border);min-height:100%}

/* ===== NOTES ===== */
.qb-note-card{background:var(--card);border-radius:10px;padding:14px;cursor:pointer;transition:.2s;border:1px solid var(--border);position:relative}
.qb-note-card:hover{transform:translateY(-2px);border-color:rgba(139,92,246,.3)}
.qb-note-card.pinned{border-color:var(--warning)}
.qb-rich-toolbar{display:flex;gap:2px;padding:7px;background:var(--bg2);border:1px solid var(--border);border-radius:8px 8px 0 0;flex-wrap:wrap}
.qb-rich-toolbar button{background:none;border:1px solid transparent;color:var(--text2);cursor:pointer;padding:5px 9px;border-radius:5px;font-size:.8rem;transition:.15s;font-family:inherit}
.qb-rich-toolbar button:hover{background:var(--card);color:var(--text);border-color:var(--border)}
.qb-rich-editor{min-height:180px;padding:14px;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:var(--bg);color:var(--text);outline:none;font-size:.95rem;line-height:1.6}

/* ===== MOOD BOARD ===== */
.qb-mood-canvas{position:relative;overflow:hidden;background:var(--bg2);border:1px solid var(--border);border-radius:12px;min-height:500px;cursor:grab}
.qb-mood-canvas.grabbing{cursor:grabbing}
.qb-mood-item{position:absolute;border-radius:8px;cursor:move;min-width:60px;min-height:40px;user-select:none}
.qb-mood-item.selected{box-shadow:0 0 0 2px var(--accent)}
.qb-mood-sticky{padding:10px;font-size:.85rem;min-width:100px;min-height:70px;resize:both;overflow:hidden}
.qb-mood-connector{position:absolute;pointer-events:none;z-index:1}
.qb-resize-handle{position:absolute;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:se-resize;right:-5px;bottom:-5px;z-index:5}

/* ===== CHARTS ===== */
.qb-chart-box{position:relative;height:240px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}

/* ===== RECORDING ===== */
.qb-rec{display:inline-flex;align-items:center;gap:6px;color:var(--danger);font-size:.85rem;font-weight:600}
.qb-rec-dot{width:8px;height:8px;background:var(--danger);border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== FILTER BAR ===== */
.qb-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.qb-filter-bar select,.qb-filter-bar input{width:auto;min-width:130px}

/* ===== VIEW ANIMATION ===== */
.qb-view{animation:viewIn .25s ease}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== LAYOUT HELPERS ===== */
.qb-row{display:flex;align-items:center}.qb-row-wrap{display:flex;flex-wrap:wrap}.qb-col{flex-direction:column}
.qb-between{justify-content:space-between}.qb-center{justify-content:center}.qb-start{justify-content:flex-start}
.qb-gap-8{gap:8px}.qb-gap-12{gap:12px}.qb-gap-16{gap:16px}.qb-gap-20{gap:20px}.qb-gap-24{gap:24px}
.qb-w-full{width:100%}.qb-flex-1{flex:1;min-width:0}.qb-shrink-0{flex-shrink:0}
.qb-grid{display:grid}.qb-grid-2{grid-template-columns:repeat(2,1fr)}.qb-grid-3{grid-template-columns:repeat(3,1fr)}.qb-grid-4{grid-template-columns:repeat(4,1fr)}
.qb-mb-4{margin-bottom:8px}.qb-mb-8{margin-bottom:16px}.qb-mb-12{margin-bottom:24px}.qb-mb-16{margin-bottom:32px}
.qb-mt-4{margin-top:8px}.qb-mt-8{margin-top:16px}.qb-mt-12{margin-top:24px}
.qb-p-8{padding:8px}.qb-p-12{padding:12px}.qb-p-16{padding:16px}.qb-p-20{padding:20px}
.qb-text-sm{font-size:.85rem}.qb-text-xs{font-size:.75rem}.qb-text-lg{font-size:1.1rem}.qb-text-xl{font-size:1.25rem}.qb-text-2xl{font-size:1.5rem}
.qb-text-muted{color:var(--text2)}.qb-text-dim{color:var(--text3)}
.qb-bold{font-weight:700}.qb-semibold{font-weight:600}
.qb-truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qb-rel{position:relative}
.qb-hidden{display:none!important}
.qb-stat-val{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.qb-stat-lbl{font-size:.78rem;color:var(--text3);margin-top:3px}
.qb-subtask{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:.85rem}
.qb-subtask-check{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.qb-subtask-check.checked{background:var(--success);border-color:var(--success)}
.qb-subtask-check.checked::after{content:'\2713';color:#fff;font-size:.55rem}

/* ===== EXPANDABLE TASK CARD ===== */
.qb-task-expand{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;padding:0 14px}
.qb-task-expand.open{max-height:800px;padding:14px;border-top:1px solid var(--border);margin-top:10px}
.qb-expand-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;padding:4px 8px;transition:.15s;border-radius:4px}
.qb-expand-btn:hover{background:var(--card-hover);color:var(--text)}
.qb-expand-btn i{transition:transform .25s}
.qb-task.expanded .qb-expand-btn i{transform:rotate(180deg)}

/* ===== XP BADGE ON CARD ===== */
.qb-xp-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:.72rem;font-weight:700;background:rgba(139,92,246,.15);color:var(--accent)}

/* ===== ATTACHMENT IN EXPANDED CARD ===== */
.qb-att-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:.82rem}
.qb-att-item img{width:48px;height:48px;object-fit:cover;border-radius:4px}
.qb-att-item audio{height:32px;flex:1}
.qb-att-type{padding:2px 8px;border-radius:4px;font-size:.68rem;font-weight:600}

/* ===== FILTER TABS (Chip-style) ===== */
.qb-filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.qb-filter-tab{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:.15s;border:1px solid var(--border);color:var(--text2);background:none;font-family:inherit;font-weight:500}
.qb-filter-tab:hover{background:var(--card-hover);color:var(--text)}
.qb-filter-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--text);font-weight:600}
.qb-filter-tab .qb-tab-count{background:var(--border);color:var(--text2);font-size:.68rem;padding:1px 6px;border-radius:10px;font-weight:700}

/* ===== TIME PICKER ===== */
.qb-time-picker{display:flex;align-items:center;gap:4px}

.qb-time-picker .qb-time-btn{background:var(--card-hover);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:.7rem;width:28px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:.15s;padding:0}
.qb-time-picker .qb-time-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.qb-time-picker .qb-time-val{background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:.95rem;font-weight:600;width:36px;height:32px;text-align:center;border-radius:6px;line-height:32px}
.qb-time-sep{font-weight:700;color:var(--text2);font-size:1rem;margin:0 2px;padding-top:18px}
.qb-ampm-toggle{display:flex;flex-direction:column;gap:2px;margin-left:4px}
.qb-ampm-toggle button{background:var(--card-hover);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:4px;transition:.15s}
.qb-ampm-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ===== PRIORITY XP LABEL ===== */
.qb-pri-option{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;transition:.12s;border-radius:6px}
.qb-pri-option:hover{background:var(--card-hover)}
.qb-pri-option.selected{background:var(--accent-dim)}
.qb-pri-xp{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px}

/* ===== MOOD BOARD ENHANCEMENTS ===== */
.qb-resize-handle{opacity:0;transition:opacity .15s}
.qb-mood-item:hover .qb-resize-handle,.qb-mood-item.selected .qb-resize-handle{opacity:1}
.qb-mood-canvas.drag-over{outline:2px dashed var(--accent);outline-offset:-4px}
.qb-mood-text-el{user-select:none}
.qb-mood-text-el[contenteditable="true"]{user-select:text;cursor:text;outline:1px solid var(--accent);border-radius:4px;outline-offset:-1px}
.qb-mood-sticky[contenteditable="true"]{outline:1px solid var(--accent);outline-offset:-1px;cursor:text}

/* ===== CALENDAR DAY VIEW ENHANCED ===== */
.qb-day-header{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(59,130,246,.06));border-color:transparent}
.qb-day-slot:hover{background:var(--card-hover)}
.qb-day-task-block{position:relative;padding:8px 12px;border-radius:6px;margin-bottom:3px;cursor:pointer;transition:.15s;color:var(--text);border-left:3px solid}
.qb-day-task-block:hover{filter:brightness(1.15);transform:translateX(2px)}
.qb-day-alltask{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;margin-bottom:4px;cursor:pointer;transition:.15s;border-left:3px solid}

/* ===== DASHBOARD MINI TIMELINE ===== */
.qb-mini-tl{max-height:280px;overflow-y:auto}

/* ===== TASK SUMMARY OVERLAY (Calendar Day View) ===== */
.qb-ts-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.qb-ts-overlay.show{display:flex}
.qb-ts-card{background:var(--card);border:1px solid var(--border);border-radius:14px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;animation:modalIn .25s ease}
.qb-ts-header{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}

.qb-ts-body{padding:18px 22px}

/* ===== MOBILE ELEMENTS ===== */
.qb-mobile-hamburger{display:none;position:fixed;top:0;left:0;z-index:55;width:44px;height:44px;background:var(--sidebar-bg);border:none;border-bottom:1px solid var(--border);border-right:1px solid var(--border);color:var(--text);font-size:1.15rem;cursor:pointer;border-radius:0 0 8px 0;transition:.2s}

.qb-mobile-overlay.show{opacity:1}

.qb-mobile-gam{display:flex;align-items:center;justify-content:center;gap:10px;min-height:36px;overflow:hidden;flex-shrink:0}
.qb-mobile-gam .qb-level-badge{font-size:.72rem;padding:3px 10px}

.qb-mobile-gam .qb-xp-bar-bg{width:60px;height:5px}

/* ===== RESPONSIVE: TABLET ===== */

  .qb-grid-4{grid-template-columns:repeat(2,1fr)}

/* ===== RESPONSIVE: SMALL MOBILE ===== */
@media(max-width:420px){
  .qb-grid-4,.qb-grid-3{grid-template-columns:repeat(2,1fr);gap:6px}

<body>
<div id="loading-screen">
  <div class="ld-icon">🎮</div>

</div>

<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="qb-sidebar-header">
      <span class="qb-sidebar-title"><i class="fas fa-gamepad"></i> QuestBoard</span>
      <button class="qb-toggle-btn" id="toggleSidebar" title="Toggle sidebar"><i class="fas fa-times"></i></button>
    </div>
    <nav class="qb-nav" id="sidebarNav">
      <button class="qb-nav-item active" data-view="dashboard"><span class="qb-nav-icon"><i class="fas fa-home"></i></span><span class="qb-nav-label">Dashboard</span></button>
      <button class="qb-nav-item" data-view="tasks"><span class="qb-nav-icon"><i class="fas fa-tasks"></i></span><span class="qb-nav-label">Tasks</span></button>
      <button class="qb-nav-item" data-view="calendar"><span class="qb-nav-icon"><i class="fas fa-calendar-alt"></i></span><span class="qb-nav-label">Calendar</span></button>
      <button class="qb-nav-item" data-view="notes"><span class="qb-nav-icon"><i class="fas fa-sticky-note"></i></span><span class="qb-nav-label">Notes</span></button>
      <button class="qb-nav-item" data-view="moodboard"><span class="qb-nav-icon"><i class="fas fa-palette"></i></span><span class="qb-nav-label">Mood Board</span></button>
      <button class="qb-nav-item" data-view="analytics"><span class="qb-nav-icon"><i class="fas fa-chart-line"></i></span><span class="qb-nav-label">Analytics</span></button>
      <button class="qb-nav-item" data-view="settings"><span class="qb-nav-icon"><i class="fas fa-cog"></i></span><span class="qb-nav-label">Settings</span></button>

  </aside>

  <button class="qb-mobile-hamburger" id="mobileHamburger"><i class="fas fa-bars"></i></button>
  <div class="qb-mobile-overlay" id="mobileOverlay"></div>

    <div class="qb-mobile-gam" id="mobileGam"></div>
  </nav>

<div class="qb-ctx" id="ctxMenu"></div>

<script>
// ==================== UTILITIES ====================
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const uuid = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)});
const today = () => new Date().toISOString().split('T')[0];
const nowISO = () => new Date().toISOString();
const debounce = (fn,ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a),ms); }; };
const fmtDate = d => { if(!d)return''; const dt=new Date(d); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const fmtTime = t => { if(!t)return''; const[h,m]=t.split(':'); const hr=parseInt(h); return `${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`; };
const isToday = d => d && d.split('T')[0]===today();
const isOverdue = d => d && !isToday(d) && new Date(d)<new Date(today());
const clamp = (v,mn,mx) => Math.max(mn,Math.min(mx,v));
const escHtml = t => { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; };

// ==================== INDEXEDDB ====================
class DB {
  constructor(){this.db=null}
  async init(){
    return new Promise((ok,no)=>{
      const r=indexedDB.open('QuestBoardDB',2);
      r.onupgradeneeded=e=>{
        const db=e.target.result;
        ['tasks','notes','moodBoardItems','gamification','analytics'].forEach(n=>{
          if(!db.objectStoreNames.contains(n)){
            const s=db.createObjectStore(n,{keyPath:'id'});
            if(n==='tasks'){s.createIndex('completed','completed');s.createIndex('dueDate','dueDate');s.createIndex('category','category')}
            if(n==='notes')s.createIndex('pinned','pinned');
          }
        });
      };
      r.onsuccess=e=>{this.db=e.target.result;ok()};
      r.onerror=e=>no(e.target.error);
    });
  }
  _tx(s,m='readonly'){return this.db.transaction(s,m).objectStore(s)}
  async add(s,i){return new Promise((ok,no)=>{const r=this._tx(s,'readwrite').add(i);r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error)})}
  async get(s,id){return new Promise((ok,no)=>{const r=this._tx(s).get(id);r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error)})}
  async getAll(s){return new Promise((ok,no)=>{const r=this._tx(s).getAll();r.onsuccess=()=>ok(r.result||[]);r.onerror=()=>no(r.error)})}
  async put(s,i){return new Promise((ok,no)=>{const r=this._tx(s,'readwrite').put(i);r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error)})}
  async del(s,id){return new Promise((ok,no)=>{const r=this._tx(s,'readwrite').delete(id);r.onsuccess=()=>ok();r.onerror=()=>no(r.error)})}
  async clear(s){return new Promise((ok,no)=>{const r=this._tx(s,'readwrite').clear();r.onsuccess=()=>ok();r.onerror=()=>no(r.error)})}
  async exportAll(){
    const d={};
    for(const s of['tasks','notes','moodBoardItems','gamification','analytics'])d[s]=await this.getAll(s);
    d.settings=JSON.parse(localStorage.getItem('qb_settings')||'{}');
    return d;
  }
  async importAll(d){
    for(const s of['tasks','notes','moodBoardItems','gamification','analytics']){
      if(d[s]){await this.clear(s);for(const i of d[s])await this.add(s,i)}
    }
    if(d.settings)localStorage.setItem('qb_settings',JSON.stringify(d.settings));
  }
}
const db=new DB();

// ==================== GAMIFICATION ====================
const ACHS=[
  {id:'first_task',name:'First Quest',desc:'Complete your first task',icon:'⭐'},
  {id:'streak_7',name:'Week Warrior',desc:'7-day streak',icon:'🔥'},
  {id:'tasks_100',name:'Centurion',desc:'Complete 100 tasks',icon:'💯'},
  {id:'night_owl',name:'Night Owl',desc:'Complete a task after 11pm',icon:'🦉'},
  {id:'early_bird',name:'Early Bird',desc:'Complete a task before 7am',icon:'🐦'},
  {id:'project_master',name:'Project Master',desc:'Complete a project task',icon:'🏗️'},
  {id:'streak_30',name:'Monthly Hero',desc:'30-day streak',icon:'⚡'},
  {id:'high_energy',name:'Energy Master',desc:'10 high/critical energy tasks',icon:'💪'},
  {id:'note_taker',name:'Scholar',desc:'Create 10 notes',icon:'📝'},
  {id:'organized',name:'Organized Mind',desc:'Tag 20 tasks',icon:'🏷️'}
];
const TITLES=['Novice','Apprentice','Journeyman','Expert','Master','Grandmaster','Legend'];
const TITLE_LV=[[1,2],[3,5],[6,10],[11,15],[16,20],[21,30],[31,Infinity]];
const PETS={cat:{emoji:'🐱'},dog:{emoji:'🐶'},dragon:{emoji:'🐉'},phoenix:{emoji:'🔥'},robot:{emoji:'🤖'}};
const EVOS=['Egg','Baby','Child','Teen','Adult','Legendary'];

class GamEngine {
  constructor(){
    this.data=null;
    this.settings=JSON.parse(localStorage.getItem('qb_settings')||'null')||{
      mode:'rpg',showXP:true,showStreaks:true,showPet:true,showLevel:true,
      soundEffects:false,confettiOnComplete:true,darkMode:true,achievementsEnabled:true
    };
  }
  async load(){
    let d=await db.get('gamification','main');
    if(!d){
      d={id:'main',mode:'rpg',
        rpg:{level:1,totalXP:0,currentXP:0,xpToNext:100,title:'Novice',achievements:[],tasksCompleted:0,highEnergyCompleted:0,taggedTasks:0,notesCreated:0},
        streak:{currentStreak:0,longestStreak:0,lastCompletedDate:null,pet:{name:'Buddy',type:'cat',level:0,happiness:50,evolution:0}},
        settings:this.settings};
      await db.add('gamification',d);
    }
    this.data=d;
    this.settings={...this.settings,...d.settings};
    this.settings.mode=d.mode;
    this.saveSettings();
  }
  saveSettings(){localStorage.setItem('qb_settings',JSON.stringify(this.settings))}
  async save(){if(this.data)await db.put('gamification',this.data)}
  xpFor(e){return{low:10,medium:25,high:50,critical:75,boss:100}[e]||25}
  titleFor(lv){for(let i=TITLE_LV.length-1;i>=0;i--)if(lv>=TITLE_LV[i][0])return TITLES[i];return'Novice'}
  async awardXP(amt,el){
    if(this.settings.mode==='zen')return;
    if(this.settings.mode!=='rpg'&&this.settings.mode!=='streak')return;
    const r=this.data.rpg;r.currentXP+=amt;r.totalXP+=amt;
    while(r.currentXP>=r.xpToNext){r.currentXP-=r.xpToNext;r.level++;r.xpToNext=r.level*100;r.title=this.titleFor(r.level);showToast(`Level Up! Level ${r.level} - ${r.title}`,'success')}
    if(el)showXPFloat(el,`+${amt} XP`);
    await this.save();renderSidebarGam();
  }
  async completeTask(task){
    const r=this.data.rpg;r.tasksCompleted++;
    if(task.energyLevel==='high'||task.energyLevel==='critical')r.highEnergyCompleted++;
    if(task.tags&&task.tags.length>0)r.taggedTasks++;
    await this.awardXP(this.xpFor(task.energyLevel));
    await this.checkAch(task);
    if(this.settings.mode==='streak'||this.settings.showStreaks)await this.updateStreak();
    if(this.settings.confettiOnComplete)showConfetti();
  }
  async updateStreak(){
    const s=this.data.streak,td=today();
    if(s.lastCompletedDate===td)return;
    const yd=new Date();yd.setDate(yd.getDate()-1);const ys=yd.toISOString().split('T')[0];
    if(s.lastCompletedDate===ys||!s.lastCompletedDate)s.currentStreak++;
    else if(s.lastCompletedDate!==td)s.currentStreak=1;
    s.lastCompletedDate=td;
    if(s.currentStreak>s.longestStreak)s.longestStreak=s.currentStreak;
    s.pet.happiness=clamp(s.currentStreak*5+30,0,100);
    s.pet.level=Math.floor(s.currentStreak/7);
    s.pet.evolution=s.currentStreak>=90?5:s.currentStreak>=60?4:s.currentStreak>=30?3:s.currentStreak>=14?2:s.currentStreak>=7?1:0;
    await this.save();renderSidebarGam();
  }
  async checkAch(task){
    if(!this.settings.achievementsEnabled)return;
    const r=this.data.rpg,unlocked=r.achievements.map(a=>a.id),nw=[];
    const chk=a=>{if(!unlocked.includes(a.id)){r.achievements.push({...a,unlockedAt:nowISO()});nw.push(a)}};
    if(r.tasksCompleted>=1)chk(ACHS[0]);if(this.data.streak.currentStreak>=7)chk(ACHS[1]);if(r.tasksCompleted>=100)chk(ACHS[2]);
    if(task){const h=new Date().getHours();if(h>=23||h<5)chk(ACHS[3]);if(h>=5&&h<7)chk(ACHS[4]);if(task.category==='project')chk(ACHS[5])}
    if(this.data.streak.currentStreak>=30)chk(ACHS[6]);if(r.highEnergyCompleted>=10)chk(ACHS[7]);if(r.notesCreated>=10)chk(ACHS[8]);if(r.taggedTasks>=20)chk(ACHS[9]);
    if(nw.length>0){await this.save();nw.forEach(showAchievement)}
  }
  async incNotes(){this.data.rpg.notesCreated++;await this.save()}
}

function showToast(msg,type='info'){
  const c=$('#toast-container'),t=document.createElement('div');
  t.className=`qb-toast qb-toast-${type}`;
  const ic={success:'check-circle',error:'exclamation-circle',info:'info-circle',warning:'exclamation-triangle'};
  t.innerHTML=`<i class="fas fa-${ic[type]||'info-circle'}"></i> ${escHtml(msg)}`;
  c.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove()},3000);
}
function showXPFloat(el,txt){
  if(!el)return;const f=document.createElement('div');f.className='qb-xp-float';f.textContent=txt;
  const r=el.getBoundingClientRect();f.style.left=r.left+r.width/2+'px';f.style.top=r.top+'px';
  document.body.appendChild(f);setTimeout(()=>f.remove(),1400);
}
function showConfetti(){
  const cols=['#8b5cf6','#3b82f6','#22c55e','#eab308','#ef4444','#ec4899'];
  for(let i=0;i<35;i++){const p=document.createElement('div');p.className='qb-confetti';
    p.style.left=Math.random()*100+'vw';p.style.top='-10px';p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.width=(4+Math.random()*7)+'px';p.style.height=(4+Math.random()*7)+'px';
    p.style.animationDuration=(1.5+Math.random()*1.5)+'s';p.style.animationDelay=Math.random()*0.4+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),3000)}
}

// ==================== MINI TASK CARD ====================
function miniTask(t){
  const catL={work:'Work',daily:'Daily',project:'Project'}[t.category]||'Daily';
  const xpVal={low:10,medium:25,high:50,critical:75,boss:100}[t.priority]||{low:10,medium:25,high:50,critical:75}[t.energyLevel]||25;
  const ov=isOverdue(t.dueDate)&&!t.completed;
  const atts=(t.attachments||[]);
  const hasAtts=atts.length>0;
  const hasDesc=!!(t.description&&t.description.trim());
  const hasSubs=(t.subtasks&&t.subtasks.length>0);
  const showTime=!!(t.startTime||t.endTime);
  const showExpand=hasAtts||hasDesc||hasSubs||showTime;
  let expandHtml='';
  if(showExpand){
    expandHtml=`<div class="qb-task-expand" id="expand-${t.id}">
      ${showTime?`<div class="qb-mb-8"><span class="qb-text-xs qb-bold qb-text-dim" style="text-transform:uppercase;letter-spacing:.5px">Schedule</span><div class="qb-text-sm qb-text-muted qb-mt-4"><i class="fas fa-clock" style="font-size:.7rem"></i> ${fmtTime(t.startTime||'--:--')}${t.endTime?' - '+fmtTime(t.endTime):' - (no end time)'}</div></div>`:''}
      ${hasDesc?`<div class="qb-mb-8"><span class="qb-text-xs qb-bold qb-text-dim" style="text-transform:uppercase;letter-spacing:.5px">Description</span><p class="qb-text-sm qb-text-muted qb-mt-4" style="white-space:pre-wrap">${escHtml(t.description)}</p></div>`:''}
      ${hasSubs?`<div class="qb-mb-8"><span class="qb-text-xs qb-bold qb-text-dim" style="text-transform:uppercase;letter-spacing:.5px">Subtasks</span><div class="qb-mt-4">${t.subtasks.map(st=>`<div class="qb-subtask"><div class="qb-subtask-check${st.completed?' checked':''}" data-dash-sub="${t.id}" data-dash-sid="${st.id}"></div><span style="${st.completed?'text-decoration:line-through;opacity:.6':''}">${escHtml(st.title)}</span></div>`).join('')}</div></div>`:''}
      ${hasAtts?`<div><span class="qb-text-xs qb-bold qb-text-dim" style="text-transform:uppercase;letter-spacing:.5px">Attachments</span><div class="qb-mt-4">${atts.map(a=>{
        if(a.type==='voice'||(a.mimeType&&a.mimeType.startsWith('audio'))){
          return `<div class="qb-att-item"><span class="qb-att-type qb-att-type-voice"><i class="fas fa-microphone"></i> Voice</span><audio controls src="${a.data}" preload="none" style="flex:1"></audio></div>`;
        }else if(a.type==='image'||(a.mimeType&&a.mimeType.startsWith('image'))){
          return `<div class="qb-att-item"><img src="${a.data}" alt="${escHtml(a.name||'Image')}"><span class="qb-text-xs qb-text-muted" style="flex:1">${escHtml(a.name||'Image')}</span></div>`;
        }else{
          return `<div class="qb-att-item"><i class="fas fa-file" style="color:var(--text3)"></i><span class="qb-text-xs qb-text-muted">${escHtml(a.name||'File')}</span></div>`;
        }
      }).join('')}</div></div>`:''}
    </div>`;
  }
  return `<div class="qb-task" data-id="${t.id}">
    <div class="qb-row qb-gap-8" style="flex-wrap:nowrap">
      <div class="qb-task-check${t.completed?' checked':''}" data-id="${t.id}" style="flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div class="qb-row qb-between" style="gap:6px">
          <div class="qb-task-title qb-truncate" style="flex:1;min-width:0">${escHtml(t.title)}</div>
          ${gam.settings.mode!=='zen'?`<span class="qb-xp-badge" style="flex-shrink:0"><i class="fas fa-bolt"></i> ${xpVal} XP</span>`:''}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px 8px;margin-top:6px;align-items:center">
          <span class="qb-badge qb-badge-${t.category}">${catL}</span>
          <span class="qb-badge qb-badge-${t.priority||'medium'}">${(t.priority||'medium').charAt(0).toUpperCase()+(t.priority||'medium').slice(1)}</span>
          ${t.startTime?`<span class="qb-text-xs qb-text-dim"><i class="fas fa-clock" style="font-size:.6rem"></i> ${fmtTime(t.startTime)}${t.endTime?' - '+fmtTime(t.endTime):''}</span>`:''}
          ${t.dueDate?`<span class="qb-text-xs" style="color:${ov?'var(--danger)':'var(--text3)'}">${ov?'Overdue: ':''}${fmtDate(t.dueDate)}</span>`:''}
          ${(t.tags||[]).slice(0,3).map(tg=>`<span class="qb-tag">${escHtml(tg)}</span>`).join('')}
        </div>
      </div>
      <div style="flex-shrink:0;display:flex;align-items:center;gap:4px">
        ${showExpand?`<button class="qb-expand-btn" data-dash-expand="${t.id}" title="Show details"><i class="fas fa-chevron-down"></i></button>`:''}
      </div>
    </div>
    ${expandHtml}
  </div>`;
}

function renderTagFilter(containerId,selectedTag,onSelect){

  h+=`<button class="qb-chip${!selectedTag?' active':''}" data-tagfilter="">All</button>`;
  tags.forEach(tg=>{
    h+=`<button class="qb-chip${selectedTag===tg?' active':''}" data-tagfilter="${escHtml(tg)}">${escHtml(tg)}</button>`;
  });
  h+=`</div>`;
  const el=$('#'+containerId);if(el)el.innerHTML=h;
  el.querySelectorAll('[data-tagfilter]').forEach(btn=>{
    btn.onclick=()=>{
      const tag=btn.dataset.tagfilter||null;

}

        });
        tlH+=`</div></div>`;
      }
      // Show tasks without start time
      const noTime=dayTasks.filter(t=>!t.startTime);
      if(noTime.length>0){
        tlH+=`<div class="qb-mini-tl-slot"><div class="qb-mini-tl-time" style="color:var(--text3)">No time</div><div>`;
        noTime.forEach(t=>{
          tlH+=`<div class="qb-mini-tl-task" data-dtl-edit="${t.id}" style="background:${colors[t.category]||'#8b5cf6'}15;border-color:${colors[t.category]||'#8b5cf6'};${t.completed?'opacity:.5;text-decoration:line-through':''}">${escHtml(t.title)}</div>`;
        });
        tlH+=`</div></div>`;
      }
      tlH+=`</div>`;
    }
    const tlEl=$('#dashDayTimeline');
    if(tlEl){tlEl.innerHTML=tlH;
      $$('.qb-mini-tl-task').forEach(el=>{el.onclick=e=>{e.stopPropagation();const task=S.tasks.find(t=>t.id===el.dataset.dtlEdit);if(task)openTaskModal(task.id)}});
    }
    // Update mini cal selection
    const calEl=$('#dashMiniCal');
    if(calEl){calEl.innerHTML=miniCal(ds);
      $$('[data-mini-cal-date]').forEach(el=>{el.onclick=()=>{renderDashTimeline(el.dataset.miniCalDate)}});
    }
  }
  renderDashTimeline(td);

  // Tag filter for dashboard
  renderTagFilter('dashTagFilter',S.dashTagFilter,function(tag){
    S.dashTagFilter=tag;
    renderDashboard();
  });

  // Bindings
  const addBtn=$('#dashAddBtn');
  if(addBtn)addBtn.onclick=()=>{$('#dashAddForm').classList.remove('qb-hidden');$('#dashInput').focus()};
  const cancelBtn=$('#dashCancel');
  if(cancelBtn)cancelBtn.onclick=()=>$('#dashAddForm').classList.add('qb-hidden');
  const saveBtn=$('#dashSave');
  if(saveBtn)saveBtn.onclick=async()=>{
    const inp=$('#dashInput');if(!inp.value.trim())return;
    const t={id:uuid(),title:inp.value.trim(),description:'',category:'daily',energyLevel:'medium',dueDate:td,startTime:null,endTime:null,completed:false,completedAt:null,createdAt:nowISO(),priority:'medium',tags:[],attachments:[],subtasks:[],recurrence:'none',xpEarned:0};
    await db.add('tasks',t);await loadTasks();showToast('Task added!','success');renderDashboard();
  };
  $$('#dashTasks .qb-task-check').forEach(el=>{
    el.onclick=async e=>{e.stopPropagation();const id=el.dataset.id;const task=S.tasks.find(t=>t.id===id);if(!task)return;
      task.completed=true;task.completedAt=nowISO();await db.put('tasks',task);await gam.completeTask(task);await loadTasks();renderDashboard()};
  });
  // Expand/collapse dashboard tasks
  $$('.qb-expand-btn[data-dash-expand]').forEach(el=>{
    el.onclick=e=>{e.stopPropagation();
      const id=el.dataset.dashExpand;
      const card=document.querySelector(`#dashTasks .qb-task[data-id="${id}"]`);
      const exp=document.getElementById('expand-'+id);
      if(card&&exp){card.classList.toggle('expanded');exp.classList.toggle('open')}
    };
  });
  // Dashboard subtask checks
  $$('[data-dash-sub]').forEach(el=>{
    el.onclick=async e=>{e.stopPropagation();
      const tid=el.dataset.dashSub,sid=el.dataset.dashSid;
      const t=S.tasks.find(x=>x.id===tid);if(!t)return;
      const st=t.subtasks.find(s=>s.id===sid);if(!st)return;st.completed=!st.completed;
      await db.put('tasks',t);await loadTasks();renderDashboard();
    };
  });
  $$('.card[data-nav]').forEach(el=>{el.onclick=()=>{navigate(el.dataset.nav);if(el.dataset.nid)S.selNoteId=el.dataset.nid}});
}

function miniCal(selDate){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7;
  let h=`<div class="qb-cal-grid">`;
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>h+=`<div class="qb-cal-head">${d}</div>`);
  for(let i=0;i<startDow;i++){const d=new Date(y,m,1-startDow+i);h+=`<div class="qb-cal-day other">${d.getDate()}</div>`}
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===today();
    const dayTasks=S.tasks.filter(t=>t.dueDate===ds);
    const hasTask=dayTasks.length>0;
    const isSel=selDate===ds;
    h+=`<div class="qb-cal-day${isT?' today':''}"${isSel?' style="background:var(--accent);color:#fff;font-weight:700"':''} data-mini-cal-date="${ds}">${d}${hasTask?'<span class="qb-cal-dot" style="background:var(--accent)"></span>':''}</div>`;
  }
  const rem=42-startDow-last.getDate();
  for(let i=1;i<=rem;i++)h+=`<div class="qb-cal-day other">${i}</div>`;
  h+=`</div>`;return h;
}

// ==================== TASKS VIEW ====================
function renderTasks(){
  let list=[...S.tasks];
  const f=S.filters;
  if(f.tab==='active')list=list.filter(t=>!t.completed);
  else if(f.tab==='done')list=list.filter(t=>t.completed);
  else if(f.tab==='work')list=list.filter(t=>t.category==='work');
  else if(f.tab==='daily')list=list.filter(t=>t.category==='daily');
  else if(f.tab==='project')list=list.filter(t=>t.category==='project');
  if(f.priority!=='all')list=list.filter(t=>t.priority===f.priority);
  if(f.tag)list=list.filter(t=>(t.tags||[]).includes(f.tag));
  if(f.search)list=list.filter(t=>t.title.toLowerCase().includes(f.search.toLowerCase())||t.description.toLowerCase().includes(f.search.toLowerCase()));
  if(S.sort==='dueDate')list.sort((a,b)=>(a.dueDate||'z').localeCompare(b.dueDate||'z'));
  if(S.sort==='priority')list.sort((a,b)=>({boss:0,urgent:1,high:2,medium:3,low:4}[a.priority]||3)-({boss:0,urgent:1,high:2,medium:3,low:4}[b.priority]||3));
  if(S.sort==='energy')list.sort((a,b)=>({critical:0,high:1,medium:2,low:3}[a.energyLevel]||2)-({critical:0,high:1,medium:2,low:3}[b.energyLevel]||2));
  if(S.sort==='name')list.sort((a,b)=>a.title.localeCompare(b.title));

  const allTasks=S.tasks,active=allTasks.filter(t=>!t.completed),done=allTasks.filter(t=>t.completed);
  const activeCount=active.length;
  S.filters.tab=S.filters.tab||'all';

  const vc=$('#viewContainer');
  vc.innerHTML=`<div class="qb-view">
    <div class="qb-row qb-between qb-mb-8">
      <div>
        <h2 class="qb-text-xl qb-bold"><i class="fas fa-scroll" style="color:var(--accent);margin-right:6px"></i>Quest Log</h2>
        <p class="qb-text-sm qb-text-dim qb-mt-4">${activeCount} active quest${activeCount!==1?'s':''}  <i class="fas fa-star" style="color:var(--accent);font-size:.7rem"></i></p>
      </div>
      <button class="qb-btn qb-btn-primary" id="addTaskBtn"><i class="fas fa-plus"></i> New Quest</button>
    </div>
    <div class="qb-filter-tabs" id="filterTabs">
      <button class="qb-filter-tab${S.filters.tab==='all'?' active':''}" data-tab="all">All <span class="qb-tab-count">${allTasks.length}</span></button>
      <button class="qb-filter-tab${S.filters.tab==='active'?' active':''}" data-tab="active">Active <span class="qb-tab-count">${active.length}</span></button>
      <button class="qb-filter-tab${S.filters.tab==='done'?' active':''}" data-tab="done">Done <span class="qb-tab-count">${done.length}</span></button>
      <button class="qb-filter-tab${S.filters.tab==='work'?' active':''}" data-tab="work">Work <span class="qb-tab-count">${allTasks.filter(t=>t.category==='work').length}</span></button>
      <button class="qb-filter-tab${S.filters.tab==='daily'?' active':''}" data-tab="daily">Daily <span class="qb-tab-count">${allTasks.filter(t=>t.category==='daily').length}</span></button>
      <button class="qb-filter-tab${S.filters.tab==='project'?' active':''}" data-tab="project">Personal <span class="qb-tab-count">${allTasks.filter(t=>t.category==='project').length}</span></button>
    </div>
    <div class="qb-row qb-gap-8 qb-mb-8" style="flex-wrap:wrap">
      <select class="qb-select" id="sortTasks" style="width:140px"><option value="dueDate" ${S.sort==='dueDate'?'selected':''}>Sort: Date</option><option value="priority" ${S.sort==='priority'?'selected':''}>Sort: Priority</option><option value="energy" ${S.sort==='energy'?'selected':''}>Sort: Energy</option><option value="name" ${S.sort==='name'?'selected':''}>Sort: Name</option></select>
      <input type="text" class="qb-input" id="searchTasks" placeholder="Search quests..." style="flex:1;min-width:150px">
    </div>
    <div id="taskTagFilter"></div>
    <div id="taskList">${list.length===0?'<p class="qb-text-muted qb-text-sm" style="padding:30px;text-align:center">No quests match your filters.</p>':list.map(t=>taskCard(t)).join('')}</div>
  </div>`;

  // Bind filter tabs
  $$('.qb-filter-tab').forEach(btn=>{
    btn.onclick=()=>{S.filters.tab=btn.dataset.tab;renderTasks()};
  });
  const sortEl=$('#sortTasks');if(sortEl)sortEl.onchange=()=>{S.sort=sortEl.value;renderTasks()};
  const searchEl=$('#searchTasks');if(searchEl)searchEl.oninput=debounce(()=>{S.filters.search=searchEl.value;renderTasks()},300);
  const addBtn=$('#addTaskBtn');if(addBtn)addBtn.onclick=()=>openTaskModal();
  bindTaskEvents();
  // Tag filter for tasks view
  renderTagFilter('taskTagFilter',S.filters.tag,function(tag){
    S.filters.tag=tag;
    renderTasks();
  });
}

function taskCard(t){
  const catL={work:'Work',daily:'Daily',project:'Project'}[t.category]||'Daily';
  const xpVal={low:10,medium:25,high:50,critical:75,boss:100}[t.priority]||{low:10,medium:25,high:50,critical:75}[t.energyLevel]||25;
  const xpClr={low:'var(--success)',medium:'var(--accent2)',high:'var(--warning)',critical:'var(--danger)',boss:'var(--danger)'};
  const ov=isOverdue(t.dueDate)&&!t.completed;
  const priLbl={low:'Low',medium:'Medium',high:'High',critical:'Critical',boss:'BOSS'};
  const atts=(t.attachments||[]);
  const hasAtts=atts.length>0;
  const hasDesc=!!(t.description&&t.description.trim());
  const hasSubs=(t.subtasks&&t.subtasks.length>0);
  const showTime=!!(t.startTime||t.endTime);
  const showExpand=hasAtts||hasDesc||hasSubs||showTime;

  let expandHtml='';
  if(showExpand){
    expandHtml=`<div class="qb-task-expand" id="expand-${t.id}">
      ${showTime?`<div class="qb-mb-8"><span class="qb-text-xs qb-bold qb-text-dim" style="text-transform:uppercase;letter-spacing:.5px">Schedule</span><div class="qb-text-sm qb-text-muted qb-mt-4"><i class="fas fa-clock" style="font-size:.7rem"></i> ${fmtTime(t.startTime||'--:--')}${t.endTime?' - '+fmtTime(t.endTime):' - (no end time)'}</div></div>`:''}
      ${hasDesc?`<div class="qb-mb-8"><span class="qb-text-xs qb-bold qb-text-dim" style="text-transform:uppercase;letter-spacing:.5px">Description</span><p class="qb-text-sm qb-text-muted qb-mt-4" style="white-space:pre-wrap">${escHtml(t.description)}</p></div>`:''}
      ${hasSubs?`<div class="qb-mb-8"><span class="qb-text-xs qb-bold qb-text-dim" style="text-transform:uppercase;letter-spacing:.5px">Subtasks</span><div class="qb-mt-4">${t.subtasks.map(st=>`<div class="qb-subtask"><div class="qb-subtask-check${st.completed?' checked':''}" data-task="${t.id}" data-sub="${st.id}"></div><span style="${st.completed?'text-decoration:line-through;opacity:.6':''}">${escHtml(st.title)}</span></div>`).join('')}</div></div>`:''}
      ${hasAtts?`<div><span class="qb-text-xs qb-bold qb-text-dim" style="text-transform:uppercase;letter-spacing:.5px">Attachments</span><div class="qb-mt-4">${atts.map(a=>{
        if(a.type==='voice'||a.mimeType&&a.mimeType.startsWith('audio')){
          return `<div class="qb-att-item"><span class="qb-att-type qb-att-type-voice"><i class="fas fa-microphone"></i> Voice</span><audio controls src="${a.data}" preload="none" style="flex:1"></audio></div>`;
        }else if(a.type==='image'||a.mimeType&&a.mimeType.startsWith('image')){
          return `<div class="qb-att-item"><img src="${a.data}" alt="${escHtml(a.name||'Image')}"><span class="qb-text-xs qb-text-muted" style="flex:1">${escHtml(a.name||'Image')}</span></div>`;
        }else{
          return `<div class="qb-att-item"><i class="fas fa-file" style="color:var(--text3)"></i><span class="qb-text-xs qb-text-muted">${escHtml(a.name||'File')}</span></div>`;
        }
      }).join('')}</div></div>`:''}
    </div>`;
  }

  return `<div class="qb-task${t.completed?' done':''}" data-id="${t.id}">
    <div class="qb-row qb-gap-8" style="flex-wrap:nowrap">
      <div class="qb-task-check${t.completed?' checked':''}" data-id="${t.id}" style="flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div class="qb-row qb-between" style="gap:6px">
          <div class="qb-task-title ${t.completed?'':'qb-truncate'}" style="flex:1;min-width:0">${escHtml(t.title)}</div>
          ${gam.settings.mode!=='zen'?`<span class="qb-xp-badge" style="flex-shrink:0;${t.priority==='boss'?'background:rgba(239,68,68,.2);color:var(--danger)':''}"><i class="fas fa-bolt"></i> ${xpVal} XP</span>`:''}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px 8px;margin-top:6px;align-items:center">
          <span class="qb-badge qb-badge-${t.category}">${catL}</span>
          <span class="qb-badge" style="background:${xpClr[t.priority]||xpClr.medium}22;color:${xpClr[t.priority]||xpClr.medium}">${priLbl[t.priority]||'Medium'}</span>
          ${t.dueDate?`<span class="qb-text-xs" style="color:${ov?'var(--danger)':'var(--text3)'}"><i class="fas fa-calendar-alt" style="font-size:.65rem"></i>${ov?' Overdue: ':''}${fmtDate(t.dueDate)}</span>`:''}
          ${(t.tags||[]).slice(0,3).map(tg=>`<span class="qb-tag">${escHtml(tg)}</span>`).join('')}
        </div>
      </div>
      <div style="flex-shrink:0;display:flex;align-items:center;gap:4px">
        ${showExpand?`<button class="qb-expand-btn" data-expand="${t.id}" title="Show details"><i class="fas fa-chevron-down"></i></button>`:''}
        <button class="qb-btn-icon qb-edit-task" data-id="${t.id}" title="Edit"><i class="fas fa-pen"></i></button>
        <button class="qb-btn-icon qb-del-task" data-id="${t.id}" title="Delete" style="border-color:var(--danger);color:var(--danger)"><i class="fas fa-trash"></i></button>
      </div>
    </div>
    ${expandHtml}
  </div>`;
}

function bindTaskEvents(){
  $$('#taskList .qb-task-check').forEach(el=>{
    el.onclick=async e=>{e.stopPropagation();const id=el.dataset.id;const t=S.tasks.find(x=>x.id===id);if(!t)return;
      t.completed=!t.completed;t.completedAt=t.completed?nowISO():null;await db.put('tasks',t);
      if(t.completed){t.xpEarned=gam.xpFor(t.priority==='boss'?'boss':t.energyLevel);await gam.completeTask(t)}await loadTasks();renderTasks()};
  });
  $$('#taskList .qb-subtask-check').forEach(el=>{
    el.onclick=async e=>{e.stopPropagation();const tid=el.dataset.task,sid=el.dataset.sub;
      const t=S.tasks.find(x=>x.id===tid);if(!t)return;
      const st=t.subtasks.find(s=>s.id===sid);if(!st)return;st.completed=!st.completed;
      await db.put('tasks',t);await loadTasks();renderTasks()};
  });
  $$('.qb-edit-task').forEach(el=>{el.onclick=async e=>{e.stopPropagation();openTaskModal(el.dataset.id)}});
  $$('.qb-del-task').forEach(el=>{el.onclick=async e=>{e.stopPropagation();if(!confirm('Delete this quest?'))return;await db.del('tasks',el.dataset.id);await loadTasks();showToast('Quest deleted','info');renderTasks()}});
  $$('.qb-expand-btn').forEach(el=>{
    el.onclick=e=>{e.stopPropagation();
      const id=el.dataset.expand;
      const card=document.querySelector(`.qb-task[data-id="${id}"]`);
      const exp=document.getElementById('expand-'+id);
      if(card&&exp){card.classList.toggle('expanded');exp.classList.toggle('open')}
    };
  });
}

function openTaskModal(editId){
  const t=editId?S.tasks.find(x=>x.id===editId):null;
  S.editTaskId=editId||null;
  const now=new Date();
  const td=today();
  const defDate=t&&t.dueDate?t.dueDate.split('T')[0]:td;
  const defStartH=t&&t.startTime?parseInt(t.startTime.split(':')[0]):now.getHours();
  const defStartM=t&&t.startTime?parseInt(t.startTime.split(':')[1]):now.getMinutes();
  const defEndH=t&&t.endTime?parseInt(t.endTime.split(':')[0]):(now.getHours()+1)%24;
  const defEndM=t&&t.endTime?parseInt(t.endTime.split(':')[1]):now.getMinutes();
  const selPri=t?t.priority:'medium';
  const priList=[
    {v:'low',l:'Low',xp:10,c:'var(--success)'},
    {v:'medium',l:'Medium',xp:25,c:'var(--accent2)'},
    {v:'high',l:'High',xp:50,c:'var(--warning)'},
    {v:'critical',l:'Critical',xp:75,c:'var(--danger)'},

  function timePickerHTML(fieldId,h,m){

      </div>
      <div class="qb-form-group"><label class="qb-label">Priority</label>
