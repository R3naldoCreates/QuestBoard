      <div class="qb-form-group">
        <label class="qb-label">Attachments (Images)</label>
        <input type="file" id="mtFiles" accept="image/*" multiple style="font-size:.85rem;color:var(--text2)">
      </div>
      <div class="qb-form-group">
        <div class="qb-row qb-gap-8">
          <button class="qb-btn qb-btn-secondary qb-btn-sm" id="mtVoiceBtn"><i class="fas fa-microphone"></i> Voice Memo</button>
          <span id="mtVoiceStatus" class="qb-text-xs qb-text-dim"></span>
        </div>
      </div>
      <div class="qb-form-group"><label class="qb-label">Subtasks</label><div id="mtSubtasks">${(t&&t.subtasks?t.subtasks:[]).map(s=>`<div class="qb-subtask"><input type="text" class="qb-input" value="${escHtml(s.title)}" style="width:auto;flex:1" data-sub-id="${s.id}"><button class="qb-btn-icon qb-rm-sub" style="width:28px;height:28px" data-sub-id="${s.id}"><i class="fas fa-times" style="font-size:.7rem"></i></button></div>`).join('')}<button class="qb-btn qb-btn-secondary qb-btn-sm qb-mt-4" id="mtAddSub"><i class="fas fa-plus"></i> Add Subtask</button></div>
    </div>
    <div class="qb-modal-footer"><button class="qb-btn qb-btn-secondary" id="cancelModal">Cancel</button><button class="qb-btn qb-btn-primary" id="saveTask">Save Quest</button></div>`);

  $('#closeModal').onclick=closeModal;
  $('#cancelModal').onclick=closeModal;
  $('#mtAddSub').onclick=()=>{
    const c=$('#mtSubtasks');const id=uuid();
    c.insertAdjacentHTML('beforeend',`<div class="qb-subtask qb-mt-4"><input type="text" class="qb-input" placeholder="Subtask..." style="width:auto;flex:1" data-sub-id="${id}"><button class="qb-btn-icon qb-rm-sub" style="width:28px;height:28px" data-sub-id="${id}"><i class="fas fa-times" style="font-size:.7rem"></i></button></div>`);
    $$('.qb-rm-sub').forEach(b=>b.onclick=()=>b.parentElement.remove());
  };
  $$('.qb-rm-sub').forEach(b=>b.onclick=()=>b.parentElement.remove());

  // Priority selector
  let selectedPri=selPri;
  $$('.qb-pri-option').forEach(opt=>{
    opt.onclick=()=>{
      $$('.qb-pri-option').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedPri=opt.dataset.pri;
    };
  });

  // Time picker controls
  function getTimeVal(fieldId){
    const el=document.getElementById('tp-'+fieldId);
    if(!el)return{h:0,m:0};
    return{h:parseInt(el.dataset.h)||0,m:parseInt(el.dataset.m)||0};
  }
  function setTimeVal(fieldId,h,m){
    const el=document.getElementById('tp-'+fieldId);
    if(!el)return;
    el.dataset.h=h;el.dataset.m=m;
    const h12=h%12||12;
    const hStr=String(h12).padStart(2,'0');
    const mStr=String(m).padStart(2,'0');
    const hvEl=document.querySelector('[data-tpv="'+fieldId+'-h"]');
    const mvEl=document.querySelector('[data-tpv="'+fieldId+'-m"]');
    if(hvEl)hvEl.textContent=hStr;
    if(mvEl)mvEl.textContent=mStr;
    const ampmBtn=el.querySelector('[data-dir="ampm"]');
    if(ampmBtn){ampmBtn.textContent=h<12?'AM':'PM';ampmBtn.classList.toggle('active',true)}
  }
  $$('.qb-time-btn').forEach(btn=>{
    btn.onclick=()=>{
      const fieldId=btn.dataset.tp;
      const dir=btn.dataset.dir;
      const tv=getTimeVal(fieldId);
      let h=tv.h,m=tv.m;
      if(dir==='hup')h=(h+1)%24;
      else if(dir==='hdn')h=(h+23)%24;
      else if(dir==='mup')m=(m+5)%60;
      else if(dir==='mdn')m=(m+55)%60;
      else if(dir==='ampm')h=(h+12)%24;
      setTimeVal(fieldId,h,m);
    };
  });

  // Voice memo
  let mediaRec=null,voiceChunks=[],voiceTimer=null;
  $('#mtVoiceBtn').onclick=async()=>{
    if(mediaRec&&mediaRec.state==='recording'){
      mediaRec.stop();clearInterval(voiceTimer);$('#mtVoiceStatus').textContent='Processing...';
    }else{
      try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRec=new MediaRecorder(stream);voiceChunks=[];
        mediaRec.ondataavailable=e=>{if(e.data.size>0)voiceChunks.push(e.data)};
        mediaRec.onstop=async()=>{
          stream.getTracks().forEach(t=>t.stop());
          const blob=new Blob(voiceChunks,{type:'audio/webm'});
          const reader=new FileReader();
          reader.onload=()=>{
            attData.push({id:uuid(),type:'voice',name:'Voice Memo',data:reader.result,mimeType:'audio/webm'});
            $('#mtVoiceStatus').textContent='Voice memo recorded ✓';
          };
          reader.readAsDataURL(blob);
          // Try speech recognition
          if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
            try{const sr=new(window.SpeechRecognition||window.webkitSpeechRecognition)();sr.lang='en-US';sr.maxAlternatives=1;
              sr.onresult=e=>{const txt=e.results[0][0].transcript;$('#mtVoiceStatus').innerHTML=`Voice: "${escHtml(txt)}"`;
                const dates=txt.match(/\b(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\s+\d{1,2}(?:st|nd|rd|th)?(?:,?\s+\d{4})?\b|\b\d{1,2}\/\d{1,2}\/\d{2,4}\b/gi);
                if(dates)$('#mtVoiceStatus').innerHTML+=` <span style="color:var(--warning)">📅 Detected date: ${dates[0]}</span>`;
              };sr.onerror=()=>{};sr.start()}catch(e){}
          }
        };
        mediaRec.start();let sec=0;$('#mtVoiceStatus').innerHTML='<span class="qb-rec"><span class="qb-rec-dot"></span> Recording...</span>';
        voiceTimer=setInterval(()=>{sec++;$('#mtVoiceStatus').innerHTML=`<span class="qb-rec"><span class="qb-rec-dot"></span> Recording ${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}</span>`},1000);
      }catch(e){showToast('Microphone access denied','error')}
    }
  };

  // File attachments
  const attData=[];
  $('#mtFiles').onchange=e=>{for(const f of e.target.files){
    const reader=new FileReader();reader.onload=()=>{attData.push({id:uuid(),type:'image',name:f.name,data:reader.result,mimeType:f.type});showToast(`Attached: ${f.name}`,'success')};reader.readAsDataURL(f);
  }};

  $('#saveTask').onclick=async()=>{
    const title=$('#mtTitle').value.trim();if(!title){showToast('Title required','error');return}
    const stv=getTimeVal('start');
    const etv=getTimeVal('end');
    const startTimeStr=String(stv.h).padStart(2,'0')+':'+String(stv.m).padStart(2,'0');
    const endTimeStr=String(etv.h).padStart(2,'0')+':'+String(etv.m).padStart(2,'0');
    const taskData={
      id:t?t.id:uuid(),title,description:$('#mtDesc').value,
      category:$('#mtCat').value,energyLevel:$('#mtEnergy').value,
      dueDate:$('#mtDate').value||null,startTime:startTimeStr,endTime:endTimeStr,
      completed:t?t.completed:false,completedAt:t?t.completedAt:null,createdAt:t?t.createdAt:nowISO(),
      priority:selectedPri,
      tags:$('#mtTags').value.split(',').map(x=>x.trim()).filter(Boolean),
      attachments:[...(t&&t.attachments?t.attachments:[]),...attData],
      subtasks:[...(t&&t.subtasks?t.subtasks:[]),
        ...$$('#mtSubtasks .qb-subtask').map(el=>({id:el.querySelector('input').dataset.subId,title:el.querySelector('input').value.trim()||'Untitled',completed:false}))],
      recurrence:$('#mtRec').value,xpEarned:t?t.xpEarned:0
    };
    if(t)await db.put('tasks',taskData);else await db.add('tasks',taskData);
    await loadTasks();closeModal();showToast(t?'Quest updated':'Quest created!','success');renderTasks();
  };
}

// ==================== CALENDAR VIEW ====================
function renderCalendar(){
  const vc=$('#viewContainer');
  const y=S.calDate.getFullYear(),m=S.calDate.getMonth();
  const mNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  vc.innerHTML=`<div class="qb-view">
    <div class="qb-row qb-between qb-mb-8">
      <h2 class="qb-text-xl qb-bold">Calendar</h2>
      <div class="qb-row qb-gap-8">
        <button class="qb-btn qb-btn-secondary qb-btn-sm" id="calToday" style="font-size:.78rem"><i class="fas fa-crosshairs"></i> Today</button>
        <div class="qb-row qb-gap-4">
          <button class="qb-btn-icon" id="calPrev"><i class="fas fa-chevron-left"></i></button>
          <span class="qb-semibold" id="calLabel">${mNames[m]} ${y}</span>
          <button class="qb-btn-icon" id="calNext"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="qb-row qb-gap-4">
          <button class="qb-chip${S.calView==='month'?' active':''}" id="calMonth">Month</button>
          <button class="qb-chip${S.calView==='week'?' active':''}" id="calWeek">Week</button>
          <button class="qb-chip${S.calView==='day'?' active':''}" id="calDay">Day</button>
        </div>
      </div>
    </div>
    <div id="calContent"></div>
  </div>`;

  const render=()=>{
    if(S.calView==='month')renderMonthView();
    else if(S.calView==='week')renderWeekView();
    else renderDayView();
    if(S.calView==='day'){
      const d=S.calDate;
      const dStr=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
      $('#calLabel').textContent=dStr;
    }else{
      $('#calLabel').textContent=mNames[S.calDate.getMonth()]+' '+S.calDate.getFullYear();
    }
  };

  $('#calToday').onclick=()=>{S.calDate=new Date();render()};
  $('#calPrev').onclick=()=>{S.calView==='month'?S.calDate.setMonth(S.calDate.getMonth()-1):S.calView==='week'?S.calDate.setDate(S.calDate.getDate()-7):S.calDate.setDate(S.calDate.getDate()-1);render()};
  $('#calNext').onclick=()=>{S.calView==='month'?S.calDate.setMonth(S.calDate.getMonth()+1):S.calView==='week'?S.calDate.setDate(S.calDate.getDate()+7):S.calDate.setDate(S.calDate.getDate()+1);render()};
  $('#calMonth').onclick=()=>{S.calView='month';render()};
  $('#calWeek').onclick=()=>{S.calView='week';render()};
  $('#calDay').onclick=()=>{S.calView='day';render()};
  render();
}

function renderMonthView(){
  const y=S.calDate.getFullYear(),m=S.calDate.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0),startDow=(first.getDay()+6)%7;
  const colors={work:'#3b82f6',daily:'#22c55e',project:'#a855f7'};
  let h=`<div class="qb-cal-grid" style="gap:1px">`;
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>h+=`<div class="qb-cal-head">${d}</div>`);
  for(let i=0;i<startDow;i++){const d=new Date(y,m,1-startDow+i);h+=`<div class="qb-cal-day other">${d.getDate()}</div>`}
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===today();
    const dayTasks=S.tasks.filter(t=>t.dueDate===ds);
    h+=`<div class="qb-cal-day${isT?' today':''}" data-date="${ds}" style="font-weight:${isT?'700':'400'}">${d}<div style="margin-top:2px">${dayTasks.slice(0,3).map(t=>`<span class="qb-cal-dot" style="background:${colors[t.category]||'#8b5cf6'}"></span>`).join('')}${dayTasks.length>3?`<span class="qb-text-xs" style="color:var(--text3)">+${dayTasks.length-3}</span>`:''}</div></div>`;
  }
  const rem=(7-startDow-last.getDate()%7)%7||7;
  for(let i=1;i<=rem;i++)h+=`<div class="qb-cal-day other">${i}</div>`;
  h+=`</div>`;
  $('#calContent').innerHTML=h;
  $$('.qb-cal-day:not(.other)').forEach(el=>{
    el.onclick=()=>{
      const ds=el.dataset.date;
      const dayTasks=S.tasks.filter(t=>t.dueDate===ds);
      if(dayTasks.length>0){
        showCtx(event.clientX,event.clientY,[...dayTasks.slice(0,5).map(t=>({action:'edit',icon:'pen',label:t.title})),{action:'add',icon:'plus',label:'Add task here'}]);
        $$('.qb-ctx-item').forEach(ci=>{
          ci.onclick=()=>{hideCtx();if(ci.dataset.action==='add'){openTaskModal();setTimeout(()=>$('#mtDate').value=ds,50)}else{const task=dayTasks.find(t=>t.title===ci.textContent.trim());if(task)openTaskModal(task.id)}};
        });
      }else{
        openTaskModal();setTimeout(()=>$('#mtDate').value=ds,50);
      }
    };
    // Drag & drop target
    el.ondragover=e=>{e.preventDefault();el.style.background='var(--accent-dim)'};
    el.ondragleave=()=>{el.style.background=''};
    el.ondrop=async e=>{
      e.preventDefault();el.style.background='';
      const tid=e.dataTransfer.getData('text/plain');if(!tid)return;
      const task=S.tasks.find(t=>t.id===tid);if(!task)return;
      task.dueDate=el.dataset.date;await db.put('tasks',task);await loadTasks();renderCalendar();
    };
  });
  // Make task blocks in day view draggable
  setTimeout(()=>{
    $$('.qb-task-block[draggable]').forEach(el=>{
      el.ondragstart=e=>e.dataTransfer.setData('text/plain',el.dataset.taskId);
    });
  },100);
}

function getWeekStart(d){const dt=new Date(d);const day=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-day);dt.setHours(0,0,0,0);return dt}

function renderWeekView(){
  const ws=getWeekStart(S.calDate);const colors={work:'#3b82f6',daily:'#22c55e',project:'#a855f7'};
  let h=`<div style="display:grid;grid-template-columns:60px repeat(7,1fr);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">`;
  h+=`<div style="background:var(--card);padding:8px;border-bottom:1px solid var(--border)"></div>`;
  for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);const isT=d.toISOString().split('T')[0]===today();
    h+=`<div style="background:var(--card);padding:8px;border-bottom:1px solid var(--border);text-align:center;${isT?'color:var(--accent);font-weight:700':''}"><div class="qb-text-xs">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i]}</div><div class="qb-bold">${d.getDate()}</div></div>`}
  for(let hr=6;hr<=22;hr++){
    h+=`<div class="qb-time-slot" style="background:var(--card);border-right:1px solid var(--border)">${formatHour(hr)}</div>`;
    for(let i=0;i<7;i++){
      const d=new Date(ws);d.setDate(d.getDate()+i);const ds=d.toISOString().split('T')[0];
      const slotTasks=S.tasks.filter(t=>t.dueDate===ds&&t.startTime&&parseInt(t.startTime)===hr);
      h+=`<div class="qb-time-slot qb-week-col" data-date="${ds}" data-hour="${hr}" style="cursor:pointer">${slotTasks.map(t=>`<div class="qb-task-block" data-task-id="${t.id}" draggable="true" style="background:${colors[t.category]||'#8b5cf6'}33;border-left:3px solid ${colors[t.category]||'#8b5cf6'}">${escHtml(t.title.substring(0,20))}</div>`).join('')}</div>`;
    }
  }
  h+=`</div>`;
  $('#calContent').innerHTML=h;
  // Click to add
  $$('.qb-week-col').forEach(el=>{
    el.onclick=()=>{openTaskModal();setTimeout(()=>{$('#mtDate').value=el.dataset.date;$('#mtStart').value=String(el.dataset.hour).padStart(2,'0')+':00'},50)};
  });
}

function renderDayView(){
  const d=S.calDate;
  const ds=d.toISOString().split('T')[0];
  const colors={work:'#3b82f6',daily:'#22c55e',project:'#a855f7'};
  const dayTasks=S.tasks.filter(t=>t.dueDate===ds);
  const allDayTasks=dayTasks.filter(t=>!t.startTime);
  const timedTasks=dayTasks.filter(t=>t.startTime);
  const completedCount=dayTasks.filter(t=>t.completed).length;
  const dStr=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const isT=ds===today();

  let h=`<div style="max-width:820px">`;
  // Day header with navigation
  h+=`<div class="qb-card qb-mb-8 qb-day-header">
    <div class="qb-row qb-between qb-center">
      <div class="qb-row qb-gap-12 qb-center">
        <button class="qb-btn-icon" id="dayPrev" title="Previous Day"><i class="fas fa-chevron-left"></i></button>
        <button class="qb-btn-icon" id="dayNext" title="Next Day"><i class="fas fa-chevron-right"></i></button>
        <div>
          <div class="qb-text-lg qb-bold">${dStr}${isT?' <span style="color:var(--accent);font-size:.75rem">(Today)</span>':''}</div>
          <div class="qb-text-sm qb-text-muted">${dayTasks.length} task${dayTasks.length!==1?'s':''} &middot; ${completedCount} completed &middot; ${dayTasks.length-completedCount} remaining</div>
        </div>
      </div>
      <button class="qb-btn qb-btn-primary qb-btn-sm" id="dayAddTask"><i class="fas fa-plus"></i> Add Task</button>
    </div>
  </div>`;

  if(dayTasks.length===0){
    h+=`<div class="qb-card" style="text-align:center;padding:50px 20px">
      <i class="fas fa-calendar-day" style="font-size:2.5rem;display:block;margin-bottom:12px;color:var(--text3)"></i>
      <div class="qb-text-muted qb-semibold">No tasks for this day</div>
      <div class="qb-text-xs qb-text-dim qb-mt-4">Click empty time slots to add tasks, or use the Add Task button above</div>
    </div>`;
  }else{
    // All-day tasks section
    if(allDayTasks.length>0){
      h+=`<div class="qb-mb-8"><div class="qb-text-xs qb-bold qb-text-dim qb-mb-4" style="text-transform:uppercase;letter-spacing:.5px"><i class="fas fa-clock" style="margin-right:4px"></i> All Day</div>`;
      allDayTasks.forEach(t=>{
        h+=`<div class="qb-day-alltask" style="background:var(--card);border-color:${colors[t.category]||'#8b5cf6'}" data-day-edit="${t.id}">
          <div class="qb-task-check${t.completed?' checked':''}" data-day-check="${t.id}"></div>
          <div class="qb-flex-1" style="min-width:0">
            <div class="qb-text-sm qb-semibold" style="${t.completed?'text-decoration:line-through;opacity:.6':''}">${escHtml(t.title)}</div>
            ${t.description?`<div class="qb-text-xs qb-text-dim qb-mt-4" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(t.description.substring(0,100))}${t.description.length>100?'...':''}</div>`:''}
          </div>
          <span class="qb-badge qb-badge-${t.category} qb-text-xs">${t.category}</span>
          ${gam.settings.mode!=='zen'?`<span class="qb-xp-badge"><i class="fas fa-bolt"></i> ${gam.xpFor(t.priority||t.energyLevel)}</span>`:''}
        </div>`;
      });
      h+=`</div>`;
    }

    // Hourly timeline
    h+=`<div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">`;
    for(let hr=6;hr<=23;hr++){
      const slotTasks=timedTasks.filter(t=>parseInt(t.startTime)===hr);
      h+=`<div class="qb-time-slot qb-day-slot qb-row" style="border-bottom:1px solid var(--border);min-height:52px;cursor:pointer" data-day-hour="${hr}" data-day-date="${ds}">
        <div style="width:60px;flex-shrink:0;text-align:right;padding-right:10px;color:var(--text3);font-size:.78rem">${formatHour(hr)}</div>
        <div class="qb-flex-1" style="border-left:1px solid var(--border);padding-left:6px">`;
      slotTasks.forEach(t=>{
        const bgClr=colors[t.category]||'#8b5cf6';
        h+=`<div class="qb-day-task-block" data-day-edit="${t.id}" draggable="true" style="background:${bgClr}18;border-color:${bgClr};${t.completed?'opacity:.5':''}">
          <div class="qb-row qb-gap-4 qb-between">
            <span class="qb-semibold qb-text-sm" style="${t.completed?'text-decoration:line-through':''}">${escHtml(t.title)}</span>
            ${gam.settings.mode!=='zen'?`<span class="qb-xp-badge" style="font-size:.65rem"><i class="fas fa-bolt"></i> ${gam.xpFor(t.priority||t.energyLevel)}</span>`:''}
          </div>
          <div class="qb-row qb-gap-8 qb-mt-4">
            <span class="qb-text-xs" style="opacity:.7">${fmtTime(t.startTime)}${t.endTime?' - '+fmtTime(t.endTime):''}</span>
            <span class="qb-badge qb-badge-${t.category}" style="font-size:.65rem;padding:1px 8px">${t.category}</span>
            ${t.description?`<span class="qb-text-xs qb-text-dim" style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(t.description.substring(0,60))}</span>`:''}
          </div>
          ${(t.attachments||[]).length>0?`<div class="qb-text-xs qb-mt-4" style="opacity:.5"><i class="fas fa-paperclip" style="font-size:.6rem"></i> ${(t.attachments).length} attachment(s)</div>`:''}
        </div>`;
      });
      h+=`</div></div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;
  $('#calContent').innerHTML=h;

  // Bindings
  const prevBtn=$('#dayPrev');
  if(prevBtn)prevBtn.onclick=()=>{S.calDate.setDate(S.calDate.getDate()-1);renderCalendar()};
  const nextBtn=$('#dayNext');
  if(nextBtn)nextBtn.onclick=()=>{S.calDate.setDate(S.calDate.getDate()+1);renderCalendar()};
  const addBtn=$('#dayAddTask');
  if(addBtn)addBtn.onclick=()=>{openTaskModal();setTimeout(()=>{$('#mtDate').value=ds},50)};

  // Click task to show summary
  $$('[data-day-edit]').forEach(el=>{
    el.onclick=e=>{
      if(e.target.closest('[data-day-check]'))return;
      const task=S.tasks.find(t=>t.id===el.dataset.dayEdit);
      if(task)showTaskSummary(task);
    };
  });

  // Checkbox completion
  $$('[data-day-check]').forEach(el=>{
    el.onclick=async e=>{
      e.stopPropagation();
      const task=S.tasks.find(t=>t.id===el.dataset.dayCheck);
      if(!task)return;
      task.completed=!task.completed;task.completedAt=task.completed?nowISO():null;
      await db.put('tasks',task);
      if(task.completed){task.xpEarned=gam.xpFor(task.priority==='boss'?'boss':task.energyLevel);await gam.completeTask(task)}
      await loadTasks();renderCalendar();
    };
  });

  // Click empty time slot to add task with pre-filled time
  $$('[data-day-hour]').forEach(el=>{
    el.onclick=e=>{
      if(e.target.closest('.qb-day-task-block'))return;
      const hr=parseInt(el.dataset.dayHour);
      const dateStr=el.dataset.dayDate;
      openTaskModal();
      setTimeout(()=>{
        const dateIn=$('#mtDate');if(dateIn)dateIn.value=dateStr;
        const tp=document.getElementById('tp-start');
        if(tp){tp.dataset.h=hr;tp.dataset.m=0;
          const hv=document.querySelector('[data-tpv="start-h"]');const mv=document.querySelector('[data-tpv="start-m"]');
          if(hv)hv.textContent=String(hr%12||12).padStart(2,'0');if(mv)mv.textContent='00';
          const ampm=tp.querySelector('[data-dir="ampm"]');if(ampm){ampm.textContent=hr<12?'AM':'PM';ampm.classList.add('active')}
        }
        const tpE=document.getElementById('tp-end');
        if(tpE){tpE.dataset.h=(hr+1)%24;tpE.dataset.m=0;
          const hv=document.querySelector('[data-tpv="end-h"]');const mv=document.querySelector('[data-tpv="end-m"]');
          if(hv)hv.textContent=String((hr+1)%12||12).padStart(2,'0');if(mv)mv.textContent='00';
          const ampm=tpE.querySelector('[data-dir="ampm"]');if(ampm){ampm.textContent=(hr+1)<12?'AM':'PM';ampm.classList.add('active')}
        }
      },100);
    };
  });

  // Make task blocks draggable to other days
  setTimeout(()=>{
    $$('.qb-day-task-block[draggable]').forEach(el=>{
      el.ondragstart=e=>e.dataTransfer.setData('text/plain',el.dataset.dayEdit);
    });
  },100);
}

function showTaskSummary(task){
  const catL={work:'Work',daily:'Daily',project:'Project'}[task.category]||'Daily';
  const xpVal=gam.xpFor(task.priority||task.energyLevel);
  const atts=(task.attachments||[]);
  const priLbl={low:'Low',medium:'Medium',high:'High',critical:'Critical',boss:'BOSS'};
  let bodyH='';
  if(task.description){bodyH+=`<div class="qb-ts-field"><div class="qb-ts-label">Description</div><div class="qb-ts-value" style="white-space:pre-wrap">${escHtml(task.description)}</div></div>`}
  var schedStr=task.startTime?' &middot; '+fmtTime(task.startTime)+(task.endTime?' - '+fmtTime(task.endTime):' - (no end time)'):'';
  bodyH+=`<div class="qb-ts-field"><div class="qb-ts-label">Schedule</div><div class="qb-ts-value">${fmtDate(task.dueDate)}${schedStr}</div></div>`;
  bodyH+=`<div class="qb-row qb-gap-8 qb-mb-8"><span class="qb-badge qb-badge-${task.category}">${catL}</span><span class="qb-badge qb-badge-${task.priority||'medium'}">${priLbl[task.priority]||'Medium'}</span>${gam.settings.mode!=='zen'?`<span class="qb-xp-badge"><i class="fas fa-bolt"></i> ${xpVal} XP</span>`:''}</div>`;
  if(task.tags&&task.tags.length>0){bodyH+=`<div class="qb-ts-field"><div class="qb-ts-label">Tags</div><div class="qb-row qb-gap-4 qb-row-wrap">${task.tags.map(tg=>`<span class="qb-tag">${escHtml(tg)}</span>`).join('')}</div></div>`}
  if(task.subtasks&&task.subtasks.length>0){
    bodyH+=`<div class="qb-ts-field"><div class="qb-ts-label">Subtasks (${task.subtasks.filter(s=>s.completed).length}/${task.subtasks.length})</div>`;
    task.subtasks.forEach(st=>{bodyH+=`<div class="qb-subtask" style="padding:4px 0"><div class="qb-subtask-check${st.completed?' checked':''}" style="pointer-events:none"></div><span style="${st.completed?'text-decoration:line-through;opacity:.6':''}">${escHtml(st.title)}</span></div>`});
    bodyH+=`</div>`;
  }
  if(atts.length>0){
    bodyH+=`<div class="qb-ts-field"><div class="qb-ts-label">Attachments</div>`;
    atts.forEach(a=>{
      if(a.type==='voice'||(a.mimeType&&a.mimeType.startsWith('audio'))){bodyH+=`<div class="qb-ts-att"><span class="qb-att-type qb-att-type-voice"><i class="fas fa-microphone"></i> Voice Note</span><audio controls src="${a.data}" preload="none"></audio></div>`}
      else if(a.type==='image'||(a.mimeType&&a.mimeType.startsWith('image'))){bodyH+=`<div class="qb-ts-att"><img src="${a.data}" alt="${escHtml(a.name||'Image')}"><span class="qb-ts-value" style="flex:1">${escHtml(a.name||'Image')}</span></div>`}
      else{bodyH+=`<div class="qb-ts-att"><i class="fas fa-file" style="color:var(--text3)"></i><span class="qb-ts-value">${escHtml(a.name||'File')}</span></div>`}
    });
    bodyH+=`</div>`;
  }
  if(task.recurrence&&task.recurrence!=='none'){bodyH+=`<div class="qb-ts-field"><div class="qb-ts-label">Recurrence</div><div class="qb-ts-value" style="text-transform:capitalize">${task.recurrence}</div></div>`}
  bodyH+=`<div class="qb-ts-field" style="margin-bottom:0"><div class="qb-ts-label">Created</div><div class="qb-ts-value qb-text-dim">${fmtDate(task.createdAt)}${task.completed?' &middot; <span style="color:var(--success)">Completed '+fmtDate(task.completedAt)+'</span>':''}</div></div>`;
  const ov=document.createElement('div');
  ov.className='qb-ts-overlay';
  ov.id='tsOverlay';
  ov.innerHTML=`<div class="qb-ts-card">
    <div class="qb-ts-header">
      <div class="qb-ts-title" style="${task.completed?'text-decoration:line-through;opacity:.6':''}">${escHtml(task.title)}</div>
      <div class="qb-ts-actions">
        <button class="qb-btn-icon" id="tsEdit" title="Edit"><i class="fas fa-pen"></i></button>
        <button class="qb-btn-icon" id="tsDelete" title="Delete" style="border-color:var(--danger);color:var(--danger)"><i class="fas fa-trash"></i></button>
        <button class="qb-btn-icon" id="tsClose" title="Close"><i class="fas fa-times"></i></button>
      </div>
    </div>
    <div class="qb-ts-body">${bodyH}</div>
  </div>`;
  ov.onclick=function(e){if(e.target===ov){ov.remove()}};
  document.body.appendChild(ov);
  setTimeout(function(){ov.classList.add('show')},10);
  ov.querySelector('#tsClose').onclick=function(){ov.remove()};
  ov.querySelector('#tsEdit').onclick=function(){ov.remove();openTaskModal(task.id)};
  ov.querySelector('#tsDelete').onclick=async function(){
    if(!confirm('Delete this quest?'))return;
    await db.del('tasks',task.id);await loadTasks();ov.remove();renderCalendar();showToast('Quest deleted','info');
  };
}

function formatHour(h){return `${h%12||12}:00 ${h>=12?'PM':'AM'}`}

function renderNotes(){
  const selNote=S.selNoteId?S.notes.find(n=>n.id===S.selNoteId):null;
  const sortedNotes=S.notes.sort((a,b)=>{if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;return new Date(b.updatedAt)-new Date(a.updatedAt)});
  const vc=$('#viewContainer');
  vc.innerHTML=`<div class="qb-view">
    <div class="qb-row qb-between qb-mb-8">
      <h2 class="qb-text-xl qb-bold">Notes</h2>
      <button class="qb-btn qb-btn-primary" id="newNoteBtn"><i class="fas fa-plus"></i> New Note</button>
    </div>
    <div style="display:flex;gap:16px;align-items:flex-start">
      <div style="width:240px" class="qb-shrink-0">
        <div class="qb-filter-bar qb-mb-8"><input type="text" class="qb-input" id="noteSearch" placeholder="Search notes..."></div>
        <div id="noteList">${sortedNotes.length===0?'<p class="qb-text-muted qb-text-xs" style="padding:12px;text-align:center">No notes yet</p>':sortedNotes.map(n=>`<div class="qb-note-card qb-mb-4${n.pinned?' pinned':''}" data-id="${n.id}" style="border-left:3px solid ${n.color||'var(--accent)'}"><div class="qb-text-sm qb-semibold qb-truncate">${escHtml(n.title||'Untitled')}</div><div class="qb-text-xs qb-text-dim qb-mt-4">${fmtDate(n.updatedAt)}</div></div>`).join('')}</div>

      </div>
    </div>
  </div>`;

  $('#newNoteBtn').onclick=async()=>{
    const n={id:uuid(),title:'Untitled Note',content:'',plainText:'',color:'#8b5cf6',createdAt:nowISO(),updatedAt:nowISO(),pinned:false,attachments:[],linkedTaskIds:[]};
    await db.add('notes',n);await loadNotes();await gam.incNotes();S.selNoteId=n.id;renderNotes();

  $$('#noteList .qb-note-card').forEach(el=>{

    el.oncontextmenu=e=>{e.preventDefault();const nid=el.dataset.id;
      showCtx(e.clientX,e.clientY,[{action:'pin',icon:'thumbtack',label:'Pin/Unpin'},{action:'delete',icon:'trash',label:'Delete'}]);
      $$('.qb-ctx-item').forEach(ci=>{ci.onclick=async()=>{

        if(ci.dataset.action==='delete'){await db.del('notes',nid);await loadNotes();if(S.selNoteId===nid)S.selNoteId=null;showToast('Note deleted','info');renderNotes()}

function renderNoteEditor(n){
  return `<div class="qb-card">
    <div class="qb-row qb-between qb-mb-8">
      <input type="text" class="qb-input" id="neTitle" value="${escHtml(n.title)}" style="font-size:1.1rem;font-weight:700;border:none;background:transparent;padding:0">
      <div class="qb-row qb-gap-8">
        <input type="color" id="neColor" value="${n.color||'#8b5cf6'}" style="width:32px;height:32px;border:none;background:none;cursor:pointer">
        <button class="qb-btn-icon" id="nePin" title="Pin" style="${n.pinned?'color:var(--warning);border-color:var(--warning)':''}"><i class="fas fa-thumbtack"></i></button>
      </div>
    </div>
    <div class="qb-rich-toolbar" id="neToolbar">
      <button data-cmd="bold" title="Bold"><i class="fas fa-bold"></i></button>
      <button data-cmd="italic" title="Italic"><i class="fas fa-italic"></i></button>
      <button data-cmd="underline" title="Underline"><i class="fas fa-underline"></i></button>
      <button data-cmd="insertUnorderedList" title="List"><i class="fas fa-list-ul"></i></button>
      <button data-cmd="insertOrderedList" title="Numbered List"><i class="fas fa-list-ol"></i></button>
      <button data-cmd="formatBlock" data-val="H2" title="Heading"><b>H</b></button>
      <button data-cmd="formatBlock" data-val="BLOCKQUOTE" title="Quote"><i class="fas fa-quote-right"></i></button>
    </div>
    <div class="qb-rich-editor" id="neContent" contenteditable="true">${n.content||'<p>Start writing...</p>'}</div>
    <div class="qb-mt-8 qb-row qb-gap-8 qb-row-wrap">
      <button class="qb-btn qb-btn-secondary qb-btn-sm" id="neVoiceBtn"><i class="fas fa-microphone"></i> Voice</button>
      <span id="neVoiceStatus" class="qb-text-xs qb-text-dim"></span>
    </div>
    <div class="qb-mt-4 qb-text-xs qb-text-dim">Auto-saves on change. Right-click text to convert to task.</div>
  </div>`;

  // After DOM update
  setTimeout(()=>{
    const titleIn=$('#neTitle');const contentIn=$('#neContent');const colorIn=$('#neColor');
    if(!titleIn)return;
    const saveNote=debounce(async()=>{
      const note=S.notes.find(x=>x.id===n.id);if(!note)return;
      note.title=titleIn.value;note.content=contentIn.innerHTML;
      note.plainText=contentIn.innerText;note.color=colorIn.value;note.updatedAt=nowISO();
      await db.put('notes',note);await loadNotes();
    },500);
    titleIn.oninput=saveNote;
    contentIn.oninput=saveNote;
    colorIn.oninput=saveNote;
    $('#nePin').onclick=async()=>{const note=S.notes.find(x=>x.id===n.id);if(note){note.pinned=!note.pinned;await db.put('notes',note);await loadNotes();renderNotes()}};
    $$('#neToolbar button').forEach(btn=>{
      btn.onclick=()=>{document.execCommand(btn.dataset.cmd,false,btn.dataset.val||null);contentIn.focus()};
    });

    // Text-to-task via context menu
    contentIn.oncontextmenu=e=>{
      const sel=window.getSelection();const text=sel.toString().trim();
      if(!text)return;
      showCtx(e.clientX,e.clientY,[{action:'convertToTask',icon:'tasks',label:`Convert to Quest: "${text.substring(0,30)}..."`}]);
      $$('.qb-ctx-item').forEach(ci=>{ci.onclick=()=>{hideCtx();if(ci.dataset.action==='convertToTask'){openTaskModal();setTimeout(()=>$('#mtTitle').value=text,50)}}});
    };

    // Voice
    let mRec=null,vChunks=[],vTimer=null;
    const voiceBtn=$('#neVoiceBtn');
    if(voiceBtn)voiceBtn.onclick=async()=>{
      if(mRec&&mRec.state==='recording'){mRec.stop();clearInterval(vTimer);$('#neVoiceStatus').textContent='Processing...'}
      else{
        try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});mRec=new MediaRecorder(stream);vChunks=[];
          mRec.ondataavailable=e=>{if(e.data.size>0)vChunks.push(e.data)};
          mRec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());$('#neVoiceStatus').textContent='Voice note recorded ✓';
            if('webkitSpeechRecognition' in window){try{const sr=new(window.SpeechRecognition||window.webkitSpeechRecognition)();sr.lang='en-US';sr.onresult=e=>{$('#neVoiceStatus').textContent='Transcript: '+e.results[0][0].transcript};sr.onerror=()=>{};sr.start()}catch(e){}}
          };mRec.start();let s=0;vTimer=setInterval(()=>{s++;$('#neVoiceStatus').innerHTML=`<span class="qb-rec"><span class="qb-rec-dot"></span> ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}</span>`},1000);
        }catch(e){showToast('Mic access denied','error')}
      }
    };
  },50);
}

// ==================== MOOD BOARD VIEW ====================
function renderMoodBoard(){
  const vc=$('#viewContainer');
  vc.innerHTML=`<div class="qb-view">
    <div class="qb-row qb-between qb-mb-8" style="flex-wrap:wrap;gap:8px">
      <h2 class="qb-text-xl qb-bold">Mood Board</h2>
      <div class="qb-row qb-gap-4 qb-mood-tools-wrap" style="flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;padding-bottom:4px">
        <button class="qb-chip${S.mood.tool==='select'?' active':''}" data-mood-tool="select"><i class="fas fa-mouse-pointer"></i> Select</button>
        <button class="qb-chip${S.mood.tool==='sticky'?' active':''}" data-mood-tool="sticky"><i class="fas fa-sticky-note"></i> Sticky</button>
        <button class="qb-chip${S.mood.tool==='text'?' active':''}" data-mood-tool="text"><i class="fas fa-font"></i> Text</button>
        <button class="qb-chip${S.mood.tool==='image'?' active':''}" data-mood-tool="image"><i class="fas fa-image"></i> Image</button>
        <button class="qb-chip${S.mood.tool==='box'?' active':''}" data-mood-tool="box"><i class="fas fa-vector-square"></i> Box</button>
        <button class="qb-chip${S.mood.tool==='connect'?' active':''}" data-mood-tool="connect"><i class="fas fa-project-diagram"></i> Connect</button>
        <div class="qb-row qb-gap-4" style="flex-shrink:0">
          <button class="qb-btn-icon" id="moodZoomIn" title="Zoom In"><i class="fas fa-search-plus"></i></button>
          <button class="qb-btn-icon" id="moodZoomOut" title="Zoom Out"><i class="fas fa-search-minus"></i></button>
        </div>
        <button class="qb-btn qb-btn-danger qb-btn-sm" id="moodClearAll" style="flex-shrink:0"><i class="fas fa-trash"></i> Clear</button>
      </div>
    </div>
    <div class="qb-mood-canvas" id="moodCanvas" style="min-height:550px">
      <svg id="moodSvg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1"></svg>
      <div id="moodItems"></div>
    </div>
    <div class="qb-text-xs qb-text-dim qb-mt-4" style="text-align:center">Double-click text/sticky to edit. Drag to move items. Drop images from desktop onto board. Right-click for more options.</div>
  </div>`;

  const canvas=$('#moodCanvas');
  const itemsEl=$('#moodItems');
  const svgEl=$('#moodSvg');

  // Reusable file input for image uploads
  const fileInput=document.createElement('input');
  fileInput.type='file';fileInput.accept='image/*';fileInput.multiple=true;
  fileInput.style.display='none';
  document.body.appendChild(fileInput);

  // Local state
  let dragItem=null,dragOX=0,dragOY=0;
  let isPanning=false,panStartX=0,panStartY=0,panTX=0,panTY=0;

  // --- Render items ---
  const renderItems=()=>{
    itemsEl.innerHTML=S.moodItems.filter(i=>i.type!=='connector').map(item=>{
      const col=item.color||'#8b5cf6';
      let inner='';
      let st='left:'+item.x+'px;top:'+item.y+'px;';
      if(item.width)st+='width:'+item.width+'px;';
      if(item.height)st+='height:'+item.height+'px;';
      if(item.type==='sticky'){
        inner='<div class="qb-mood-sticky" style="background:'+col+'22;border:2px solid '+col+';border-radius:8px;width:100%;height:100%;min-width:60px;min-height:40px;color:var(--text);overflow:hidden;padding:10px;font-size:.85rem" data-content-id="'+item.id+'">'+escHtml(item.content||'')+'</div>';
      }else if(item.type==='text'){
        inner='<div class="qb-mood-text-el" style="padding:4px 8px;color:var(--text);font-size:.9rem;white-space:nowrap;min-width:20px;user-select:none" data-content-id="'+item.id+'">'+escHtml(item.content||'Text')+'</div>';
      }else if(item.type==='image'){
        inner='<img src="'+item.content+'" style="width:100%;height:100%;object-fit:cover;border-radius:6px;pointer-events:none">';
      }else if(item.type==='box'){
        inner='<div style="width:100%;height:100%;border:2px solid '+col+';border-radius:6px;background:'+col+'11"></div>';
      }
      return '<div class="qb-mood-item'+(S.mood.sel===item.id?' selected':'')+'" data-id="'+item.id+'" style="'+st+'">'+inner+'<div class="qb-resize-handle" data-resize-id="'+item.id+'"></div></div>';
    }).join('');
    renderConnectors();
  };

  const renderConnectors=()=>{
    if(!svgEl)return;
    svgEl.innerHTML=S.moodItems.filter(i=>i.type==='connector').map(c=>{
      const from=S.moodItems.find(i=>i.id===c.fromId);
      const to=S.moodItems.find(i=>i.id===c.toId);
      if(!from||!to)return'';
      const fw=from.width||150,fh=from.height||100,tw=to.width||150,th=to.height||100;
      return '<line x1="'+(from.x+fw/2)+'" y1="'+(from.y+fh/2)+'" x2="'+(to.x+tw/2)+'" y2="'+(to.y+th/2)+'" stroke="'+(c.color||'#8b5cf6')+'" stroke-width="2" stroke-dasharray="6"/>';
    }).join('');
  };

  renderItems();

  // --- Tool selection ---
  $$('[data-mood-tool]').forEach(btn=>{
    btn.onclick=()=>{
      S.mood.tool=btn.dataset.moodTool;
      $$('[data-mood-tool]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      canvas.style.cursor=S.mood.tool==='select'?'grab':'crosshair';
      if(S.mood.tool==='image'){
        fileInput.value='';
        fileInput.onchange=e=>{
          Array.from(e.target.files).forEach(f=>{
            const reader=new FileReader();
            reader.onload=()=>{
              const rect=canvas.getBoundingClientRect();
              const x=20+Math.random()*(rect.width-240);
              const y=20+Math.random()*(rect.height-190);
              S.moodItems.push({id:uuid(),type:'image',x,y,width:200,height:150,content:reader.result,color:'',createdAt:nowISO()});
              renderItems();saveMood();
            };
            reader.readAsDataURL(f);
          });
        };
        fileInput.click();
      }
    };
  });

  // --- Main canvas mousedown handler ---
  canvas.onmousedown=e=>{
    const itemEl=e.target.closest('.qb-mood-item');
    const resizeH=e.target.closest('.qb-resize-handle');

    // 1. Resize handle
    if(resizeH){
      e.preventDefault();e.stopPropagation();
      const item=S.moodItems.find(i=>i.id===resizeH.dataset.resizeId);
      if(!item)return;
      const startX=e.clientX,startY=e.clientY;
      const startW=item.width||150,startH=item.height||100;
      const onMove=ev=>{
        item.width=Math.max(40,startW+(ev.clientX-startX));
        item.height=Math.max(30,startH+(ev.clientY-startY));
        const el=document.querySelector('.qb-mood-item[data-id="'+item.id+'"]');
        if(el){el.style.width=item.width+'px';el.style.height=item.height+'px'}
        renderConnectors();
      };
      const onUp=()=>{
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        saveMood();
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
      return;
    }

    // 2. Connect tool - drag from item to item to connect
    if(S.mood.tool==='connect'){
      if(itemEl){
        e.preventDefault();
        const item=S.moodItems.find(i=>i.id===itemEl.dataset.id);
        if(!item)return;
        S.mood.connFrom=itemEl.dataset.id;
        S.mood.connDragging=true;
        S.mood.connSourceRect=itemEl.getBoundingClientRect();
        $$('.qb-mood-item').forEach(el=>el.classList.remove('selected'));
        itemEl.classList.add('selected');
        // Create temp visual line (fixed positioning avoids transform math)
        var tempLine=document.createElement('div');
        tempLine.id='tempConnLine';
        tempLine.style.cssText='position:fixed;pointer-events:none;z-index:300;height:2px;background:var(--accent);transform-origin:0 0;opacity:.7';
        document.body.appendChild(tempLine);
      }
      return;
    }

    // 3. Select tool - drag items
    if(S.mood.tool==='select'&&itemEl){
      e.preventDefault();
      const item=S.moodItems.find(i=>i.id===itemEl.dataset.id);
      if(!item)return;
      S.mood.sel=itemEl.dataset.id;
      dragItem=itemEl;
      dragOX=e.clientX-item.x;
      dragOY=e.clientY-item.y;
      $$('.qb-mood-item').forEach(el=>el.classList.remove('selected'));
      itemEl.classList.add('selected');
      canvas.style.cursor='grabbing';
      return;
    }

    // 4. Create items (sticky, text, box)
    if(S.mood.tool==='sticky'||S.mood.tool==='text'||S.mood.tool==='box'){
      const rect=canvas.getBoundingClientRect();
      const x=e.clientX-rect.left;
      const y=e.clientY-rect.top;
      const cols=['#8b5cf6','#3b82f6','#22c55e','#eab308','#ef4444','#ec4899'];
      const item={
        id:uuid(),type:S.mood.tool,x,y,
        width:S.mood.tool==='sticky'?160:S.mood.tool==='box'?120:100,
        height:S.mood.tool==='sticky'?110:S.mood.tool==='box'?80:40,
        content:'',color:cols[Math.floor(Math.random()*cols.length)],createdAt:nowISO()
      };
      S.moodItems.push(item);renderItems();saveMood();
      return;
    }

    // 5. Panning (select tool on empty canvas)
    if(S.mood.tool==='select'&&!itemEl){
      isPanning=true;
      panStartX=e.clientX;panStartY=e.clientY;
      const transform=itemsEl.style.transform||'';
      const match=transform.match(/translate\(([^,)]+),\s*([^)]+)\)/);
      panTX=match?parseFloat(match[1]):0;
      panTY=match?parseFloat(match[2]):0;
      canvas.style.cursor='grabbing';
    }
  };

  // Double-click to edit text/sticky content
  canvas.ondblclick=e=>{
    const itemEl=e.target.closest('.qb-mood-item');
    if(!itemEl)return;
    const item=S.moodItems.find(i=>i.id===itemEl.dataset.id);
    if(!item||item.type==='image'||item.type==='box')return;
    const contentEl=itemEl.querySelector('[data-content-id]');
    if(!contentEl)return;
    contentEl.contentEditable='true';
    if(item.type==='text'){contentEl.style.userSelect='text';contentEl.style.cursor='text';contentEl.style.outline='1px solid var(--accent)';contentEl.style.outlineOffset='-1px';contentEl.style.borderRadius='4px'}
    if(item.type==='sticky'){contentEl.style.cursor='text';contentEl.style.outline='1px solid var(--accent)';contentEl.style.outlineOffset='-1px'}
    contentEl.focus();
    const range=document.createRange();
    range.selectNodeContents(contentEl);
    const sel=window.getSelection();
    sel.removeAllRanges();sel.addRange(range);
    const onBlur=()=>{
      contentEl.contentEditable='false';
      if(item.type==='text'){contentEl.style.userSelect='none';contentEl.style.cursor='move';contentEl.style.outline='none'}
      if(item.type==='sticky'){contentEl.style.cursor='move';contentEl.style.outline='none'}
      item.content=contentEl.textContent;
      contentEl.removeEventListener('blur',onBlur);
      contentEl.removeEventListener('keydown',onKey);
      saveMood();
    };
    const onKey=ev=>{if(ev.key==='Escape')contentEl.blur()};
    contentEl.addEventListener('blur',onBlur);
    contentEl.addEventListener('keydown',onKey);
  };

  // Mouse move for dragging, panning, and connect line
  document.addEventListener('mousemove',e=>{
    if(dragItem){
      const item=S.moodItems.find(i=>i.id===dragItem.dataset.id);
      if(item){
        item.x=e.clientX-dragOX;
        item.y=e.clientY-dragOY;
        dragItem.style.left=item.x+'px';
        dragItem.style.top=item.y+'px';
        renderConnectors();
      }
    }
    if(isPanning){
      const dx=panTX+(e.clientX-panStartX);
      const dy=panTY+(e.clientY-panStartY);
      itemsEl.style.transform='translate('+dx+'px,'+dy+'px)';
      svgEl.style.transform='translate('+dx+'px,'+dy+'px)';
    }
    if(S.mood.connDragging){
      var tl=document.getElementById('tempConnLine');
      if(tl&&S.mood.connSourceRect){
        var sx=S.mood.connSourceRect.left+S.mood.connSourceRect.width/2;
        var sy=S.mood.connSourceRect.top+S.mood.connSourceRect.height/2;
        var ddx=e.clientX-sx;
        var ddy=e.clientY-sy;
        var len=Math.sqrt(ddx*ddx+ddy*ddy);
        var angle=Math.atan2(ddy,ddx)*180/Math.PI;
        tl.style.left=sx+'px';
        tl.style.top=sy+'px';
        tl.style.width=len+'px';
        tl.style.transform='rotate('+angle+'deg)';
      }
    }
  });

  // Mouse up
  document.addEventListener('mouseup',function(e){
    if(dragItem){canvas.style.cursor='grab';saveMood();dragItem=null}
    if(isPanning){isPanning=false;canvas.style.cursor='grab'}
    if(S.mood.connDragging){
      S.mood.connDragging=false;
      var tempLine=document.getElementById('tempConnLine');
      if(tempLine)tempLine.remove();
      var elUnder=document.elementFromPoint(e.clientX,e.clientY);
      var targetEl=elUnder?elUnder.closest('.qb-mood-item'):null;
      if(targetEl&&targetEl.dataset.id!==S.mood.connFrom){
        S.moodItems.push({id:uuid(),type:'connector',fromId:S.mood.connFrom,toId:targetEl.dataset.id,x:0,y:0,width:0,height:0,content:'',color:'#8b5cf6',createdAt:nowISO()});
        renderItems();saveMood();
        showToast('Items connected!','success');
      }
      S.mood.connFrom=null;
      S.mood.connSourceRect=null;
    }
  });

  // Drag-and-drop images from desktop onto canvas
  canvas.ondragover=e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';canvas.classList.add('drag-over')};
  canvas.ondragleave=()=>{canvas.classList.remove('drag-over')};
  canvas.ondrop=e=>{
    e.preventDefault();canvas.classList.remove('drag-over');
    const files=e.dataTransfer.files;
    if(!files.length)return;
    const rect=canvas.getBoundingClientRect();
    Array.from(files).forEach(f=>{
      if(!f.type.startsWith('image/'))return;
      const reader=new FileReader();
      reader.onload=()=>{
        const x=e.clientX-rect.left-100;
        const y=e.clientY-rect.top-75;
        S.moodItems.push({id:uuid(),type:'image',x,y,width:200,height:150,content:reader.result,color:'',createdAt:nowISO()});
        renderItems();saveMood();
      };
      reader.readAsDataURL(f);
    });
  };

  // Context menu on items
  canvas.oncontextmenu=e=>{
    const itemEl=e.target.closest('.qb-mood-item');
    if(!itemEl)return;
    e.preventDefault();
    showCtx(e.clientX,e.clientY,[
      {action:'delete',icon:'trash',label:'Delete Item'},
      {action:'duplicate',icon:'copy',label:'Duplicate'},
      {action:'color',icon:'palette',label:'Change Color'},
      {action:'front',icon:'layer-group',label:'Bring to Front'}
    ]);
    $$('.qb-ctx-item').forEach(ci=>{
      ci.onclick=()=>{
        hideCtx();
        const itemId=itemEl.dataset.id;
        if(ci.dataset.action==='delete'){
          S.moodItems=S.moodItems.filter(i=>i.id!==itemId);
          S.moodItems=S.moodItems.filter(i=>i.type!=='connector'||(i.fromId!==itemId&&i.toId!==itemId));
          S.mood.sel=null;renderItems();saveMood();
        }
        if(ci.dataset.action==='duplicate'){
          const item=S.moodItems.find(i=>i.id===itemId);
          if(item){S.moodItems.push({id:uuid(),type:item.type,x:item.x+25,y:item.y+25,width:item.width,height:item.height,content:item.content,color:item.color,createdAt:nowISO()});renderItems();saveMood()}
        }
        if(ci.dataset.action==='color'){
          const item=S.moodItems.find(i=>i.id===itemId);
          if(item){item.color=['#8b5cf6','#3b82f6','#22c55e','#eab308','#ef4444','#ec4899'][Math.floor(Math.random()*6)];renderItems();saveMood()}
        }
        if(ci.dataset.action==='front'){
          const idx=S.moodItems.findIndex(i=>i.id===itemId);
          if(idx>=0){const removed=S.moodItems.splice(idx,1)[0];S.moodItems.push(removed);renderItems();saveMood()}
        }
      };
    });
  };

  // Save mood items to DB
  const saveMood=debounce(async()=>{
    const existing=await db.getAll('moodBoardItems');
    for(const ex of existing){await db.del('moodBoardItems',ex.id)}
    for(const item of S.moodItems){await db.add('moodBoardItems',item)}
  },800);

  // Zoom
  $('#moodZoomIn').onclick=()=>{S.mood.zoom=Math.min(3,S.mood.zoom+0.2);itemsEl.style.transform='scale('+S.mood.zoom+')';svgEl.style.transform='scale('+S.mood.zoom+')'};
  $('#moodZoomOut').onclick=()=>{S.mood.zoom=Math.max(0.3,S.mood.zoom-0.2);itemsEl.style.transform='scale('+S.mood.zoom+')';svgEl.style.transform='scale('+S.mood.zoom+')'};

  // Clear all
  $('#moodClearAll').onclick=async()=>{
    if(!confirm('Clear entire mood board?'))return;
    const all=await db.getAll('moodBoardItems');
    for(const i of all){await db.del('moodBoardItems',i.id)}
    S.moodItems=[];S.mood.sel=null;renderItems();showToast('Mood board cleared','info');
  };
}

// ==================== ANALYTICS VIEW ====================
function renderAnalytics(){
  // Destroy old charts
  S.charts.forEach(c=>{if(c&&c.destroy)c.destroy()});S.charts=[];

  const td=today();const weekAgo=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  const weekTasks=S.tasks.filter(t=>t.completed&&t.completedAt&&t.completedAt.split('T')[0]>=weekAgo);
  const allWeekTasks=S.tasks.filter(t=>t.dueDate&&t.dueDate>=weekAgo&&t.dueDate<=td);
  const compRate=allWeekTasks.length>0?Math.round(weekTasks.length/allWeekTasks.length*100):0;
  const hourly=new Array(24).fill(0);
  weekTasks.forEach(t=>{const h=new Date(t.completedAt).getHours();hourly[h]++});
  const catBreak={work:0,daily:0,project:0};weekTasks.forEach(t=>{if(catBreak[t.category]!==undefined)catBreak[t.category]++});
  const enBreak={low:0,medium:0,high:0,critical:0};weekTasks.forEach(t=>{if(enBreak[t.energyLevel]!==undefined)enBreak[t.energyLevel]++});
  const dailyComp={};for(let i=6;i>=0;i--){const d=new Date(Date.now()-i*86400000).toISOString().split('T')[0];dailyComp[d]=weekTasks.filter(t=>t.completedAt&&t.completedAt.startsWith(d)).length}

  const d=gam.data;
  const vc=$('#viewContainer');
  vc.innerHTML=`<div class="qb-view">
    <div class="qb-row qb-between qb-mb-8"><h2 class="qb-text-xl qb-bold">Player Report</h2><span class="qb-text-muted">${fmtDate(new Date(weekAgo))} — ${fmtDate(new Date())}</span></div>
    <div class="qb-grid qb-grid-4 qb-mb-12" style="gap:12px">
      <div class="qb-card qb-stat-card"><div class="qb-stat-val">${weekTasks.length}</div><div class="qb-stat-lbl"><i class="fas fa-check-circle" style="color:var(--success)"></i> Completed</div></div>
      <div class="qb-card qb-stat-card"><div class="qb-stat-val">${compRate}%</div><div class="qb-stat-lbl"><i class="fas fa-percentage" style="color:var(--accent)"></i> Completion Rate</div></div>
      <div class="qb-card qb-stat-card"><div class="qb-stat-val">${d?d.streak.longestStreak:0}</div><div class="qb-stat-lbl"><i class="fas fa-fire" style="color:var(--warning)"></i> Best Streak</div></div>
      <div class="qb-card qb-stat-card"><div class="qb-stat-val">${d?d.rpg.totalXP:0}</div><div class="qb-stat-lbl"><i class="fas fa-bolt" style="color:var(--accent)"></i> Total XP</div></div>
    </div>
    <div class="qb-grid qb-grid-2 qb-mb-12" style="gap:16px">
      <div class="qb-chart-box"><div class="qb-text-sm qb-semibold qb-mb-4">Daily Completions</div><canvas id="chartDaily"></canvas></div>
      <div class="qb-chart-box"><div class="qb-text-sm qb-semibold qb-mb-4">Productive Hours</div><canvas id="chartHourly"></canvas></div>
      <div class="qb-chart-box"><div class="qb-text-sm qb-semibold qb-mb-4">Category Breakdown</div><canvas id="chartCat"></canvas></div>
      <div class="qb-chart-box"><div class="qb-text-sm qb-semibold qb-mb-4">Energy Distribution</div><canvas id="chartEnergy"></canvas></div>
    </div>
    ${d&&d.rpg.achievements.length>0?`<div class="qb-card"><div class="qb-text-sm qb-semibold qb-mb-8">Achievements (${d.rpg.achievements.length}/${ACHS.length})</div><div class="qb-row qb-row-wrap qb-gap-8">${ACHS.map(a=>{const unlocked=d.rpg.achievements.find(x=>x.id===a.id);return `<div style="width:80px;text-align:center;padding:10px;border-radius:8px;background:${unlocked?'var(--accent-dim)':'var(--bg)'};border:1px solid ${unlocked?'var(--accent)':'var(--border)'};opacity:${unlocked?1:.4}"><div style="font-size:1.5rem">${a.icon}</div><div class="qb-text-xs qb-mt-4">${a.name}</div></div>`}).join('')}</div></div>`:''}
  </div>`;

  const chartOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'var(--text2)',font:{size:11}}}}};
  const scaleOpts={...chartOpts,scales:{x:{ticks:{color:'var(--text3)'},grid:{color:'rgba(58,58,96,.2)'}},y:{ticks:{color:'var(--text3)'},grid:{color:'rgba(58,58,96,.2)'}}}};

  setTimeout(()=>{
    const dailyEl=$('#chartDaily');if(dailyEl){
      S.charts.push(new Chart(dailyEl,{type:'line',data:{labels:Object.keys(dailyComp).map(d=>new Date(d).toLocaleDateString('en-US',{weekday:'short'})),datasets:[{label:'Tasks',data:Object.values(dailyComp),borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,.15)',fill:true,tension:.4}]},options:scaleOpts}));
    }
    const hourlyEl=$('#chartHourly');if(hourlyEl){
      S.charts.push(new Chart(hourlyEl,{type:'bar',data:{labels:Array.from({length:24},(_,i)=>`${(i%12)||12}${i<12?'a':'p'}`),datasets:[{label:'Tasks',data:hourly,backgroundColor:'rgba(59,130,246,.5)',borderColor:'#3b82f6',borderRadius:4}]},options:scaleOpts}));
    }
    const catEl=$('#chartCat');if(catEl){
      S.charts.push(new Chart(catEl,{type:'doughnut',data:{labels:['Work','Daily','Project'],datasets:[{data:[catBreak.work,catBreak.daily,catBreak.project],backgroundColor:['#3b82f6','#22c55e','#a855f7'],borderWidth:0}]},options:{...chartOpts,cutout:'65%'}}));
    }
    const enEl=$('#chartEnergy');if(enEl){
      S.charts.push(new Chart(enEl,{type:'bar',data:{labels:['Low','Medium','High','Critical'],datasets:[{label:'Tasks',data:[enBreak.low,enBreak.medium,enBreak.high,enBreak.critical],backgroundColor:['#22c55e','#3b82f6','#eab308','#ef4444'],borderRadius:4}]},options:scaleOpts}));
    }
  },100);
}

  $('#modeZen').onclick=async()=>{gam.settings.mode='zen';gam.data.mode='zen';await gam.save();gam.saveSettings();renderSidebarGam();renderSettings()};

  // Theme
  $('#themeDark').onclick=()=>{gam.settings.darkMode=true;gam.saveSettings();document.documentElement.dataset.theme='dark';renderSettings()};
  $('#themeLight').onclick=()=>{gam.settings.darkMode=false;gam.saveSettings();document.documentElement.dataset.theme='light';renderSettings()};

  $('#exportBtn').onclick=async()=>{

      setTimeout(()=>location.reload(),1500);
    }catch(e){showToast('Import failed: Invalid file','error')}
  };

  // Clear all
  $('#clearAllBtn').onclick=async()=>{
    if(!confirm('This will permanently delete ALL your data. Are you sure?'))return;
    if(!confirm('Really? This cannot be undone.'))return;
    for(const s of['tasks','notes','moodBoardItems','gamification','analytics'])await db.clear(s);
    localStorage.removeItem('qb_settings');showToast('All data cleared. Reloading...','info');
    setTimeout(()=>location.reload(),1000);
  };
}

// ==================== NAVIGATION ====================
function navigate(view){
  S.view=view;
  $$('.qb-nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===view));
  // Scroll main content to top
  var mc=$('#main-content');if(mc)mc.scrollTop=0;
  // Destroy charts if leaving analytics
  if(S.view!=='analytics'&&S.charts.length>0){S.charts.forEach(c=>{try{c.destroy()}catch(e){}});S.charts=[]}
  switch(view){
    case'dashboard':renderDashboard();break;
    case'tasks':renderTasks();break;
    case'calendar':renderCalendar();break;
    case'notes':renderNotes();break;
    case'moodboard':renderMoodBoard();break;
    case'analytics':renderAnalytics();break;
    case'settings':renderSettings();break;
  }
}

// ==================== GLOBAL EVENTS ====================
function setupEvents(){
  // Sidebar nav (desktop + mobile drawer)
  $$('.qb-nav-item').forEach(btn=>{btn.onclick=()=>{
    navigate(btn.dataset.view);
    closeMobileSidebar();
  }});

  // Toggle sidebar (desktop)
  var toggleBtn=$('#toggleSidebar');
  if(toggleBtn){toggleBtn.onclick=()=>{
    if(window.innerWidth<=768){closeMobileSidebar()}
    else{$('#sidebar').classList.toggle('collapsed')}
  }}

  // Mobile hamburger opens sidebar drawer
  var hamBtn=$('#mobileHamburger');
  if(hamBtn){hamBtn.onclick=function(){openMobileSidebar()}}

  // Mobile overlay click to close sidebar drawer
  var mobOverlay=$('#mobileOverlay');
  if(mobOverlay){mobOverlay.onclick=function(){closeMobileSidebar()}}

  // Close modal on overlay click
  $('#modalOverlay').onclick=e=>{if(e.target.id==='modalOverlay')closeModal()};

  // Close context menu
  document.addEventListener('click',hideCtx);

  // Keyboard shortcuts
  document.addEventListener('keydown',e=>{
    if(e.ctrlKey&&e.key==='n'){e.preventDefault();openTaskModal()}
    if(e.key==='Escape'){closeModal();hideCtx();closeMobileSidebar()}
  });

  // Apply saved theme
  if(gam.settings.darkMode===false)document.documentElement.dataset.theme='light';
}

function isMobile(){return window.innerWidth<=768}

function openMobileSidebar(){
  var sb=$('#sidebar');
  var ov=$('#mobileOverlay');
  if(sb){sb.classList.add('mobile-open');sb.classList.remove('collapsed')}
  if(ov){ov.style.display='block';requestAnimationFrame(function(){ov.classList.add('show')})}
}

function closeMobileSidebar(){
  var sb=$('#sidebar');
  var ov=$('#mobileOverlay');
  if(sb){sb.classList.remove('mobile-open')}
  if(ov){ov.classList.remove('show');setTimeout(function(){ov.style.display='none'},260)}
}

// ==================== PWA ====================
function setupPWA(){
  if('serviceWorker' in navigator){
    const swCode=`self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{self.clients.claim()});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)))})`;
    const blob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();showToast('Install QuestBoard as an app!','info');
  });
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded',async()=>{
  try{
    await db.init();
    await gam.load();
    await loadAll();
    setupEvents();
    setupPWA();
    renderSidebarGam();

    // Remove loading screen, show app
    $('#loading-screen').style.display='none';
    $('#app').style.display='flex';

    // Navigate to dashboard
    navigate('dashboard');
    S.loaded=true;
  }catch(error){
    console.error('QuestBoard init error:',error);
    $('#loading-screen').innerHTML=`<div style="text-align:center;color:var(--danger)"><div style="font-size:2.5rem;margin-bottom:12px">⚠️</div><div class="qb-text-lg qb-bold">Failed to load</div><div class="qb-text-sm qb-mt-4 qb-text-muted">${escHtml(error.message)}</div><button class="qb-btn qb-btn-primary qb-mt-8" onclick="location.reload()">Retry</button></div>`;
  }
});
</script>
</body>
</html>
